<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak | Scoreboard Pro</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* 1. IMAGE DE DÉMARRAGE (Remplace l'URL par ton image) */
        #intro-layer { 
            position: fixed; inset: 0; z-index: 200; 
            background: url('https://unsplash.com') center/cover;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 1s;
        }
        #intro-layer::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: -1; }

        #flash-bang { position: fixed; inset: 0; background: white; opacity: 0; z-index: 210; pointer-events: none; }
        .word { position: absolute; font-size: 8vw; font-weight: 900; transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; }
        #part-1 { color: #ff4444; transform: translateX(-150%) rotateY(30deg); }
        #part-2 { color: #44ff44; transform: translateX(150%) rotateY(-30deg); }
        .fusion-active #part-1 { opacity: 1; transform: translateX(-40%) rotateY(0deg); }
        .fusion-active #part-2 { opacity: 1; transform: translateX(42%) rotateY(0deg); }
        .kill-e { display: inline-block; transition: all 0.2s ease 1.3s; width: 0.8em; opacity: 1; }
        .fusion-active .kill-e { width: 0; opacity: 0; transform: scale(0); }

        /* 2. INTERFACE DE SCORE SÉPARÉE (Dynamique) */
        #score-board { position: fixed; top: 20px; right: 20px; z-index: 100; display: none; flex-direction: column; gap: 12px; }
        .player-card { 
            background: rgba(0,0,0,0.85); border: 2px solid #44ff44; padding: 12px 20px; 
            border-radius: 12px; min-width: 220px; text-align: left; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Style spécial pour le Leader (Premier) */
        .player-card.leader { border-color: #ffcc00; box-shadow: 0 0 20px #ffcc0044; transform: scale(1.05); }
        .player-name { color: #fff; font-size: 14px; letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between; }
        .player-pts { color: #44ff44; font-size: 26px; font-weight: 900; margin-top: 5px; }
        .leader .player-pts { color: #ffcc00; }

        /* HUD CHRONO */
        #chrono-hud { position: fixed; top: 20px; left: 20px; z-index: 100; display: none; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 10px; border-bottom: 4px solid #ff4444; font-size: 32px; color: #ff4444; font-weight: 900; }

        /* Menus */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .menu-step { display: none; flex-direction: column; align-items: center; }
        .active-step { display: flex; }
        .btn { background: transparent; border: 2px solid #44ff44; color: #44ff44; padding: 15px 40px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; margin: 10px; transition: 0.3s; }
        .btn:hover { background: #44ff44; color: #000; box-shadow: 0 0 20px #44ff44; }
        input { background: rgba(255,255,255,0.1); border: 2px solid #ff4444; color: white; padding: 15px; text-align: center; border-radius: 5px; width: 320px; outline: none; margin: 10px; font-family: 'Orbitron'; font-size: 18px; }

        /* Univers */
        #system-container { position: relative; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; transform: scale(0.47); }
        #sun { width: 120px; height: 120px; background: radial-gradient(circle, #fff, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 80px #ff6600; z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: #000; cursor: pointer; }
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; width: 64px; height: 64px; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; cursor: pointer; transition: transform 0.2s; }
        .planet:active { transform: translate(-50%, -50%) scale(0.9); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flash { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash-bang"></div>
    <div id="chrono-hud">02:00</div>
    <div id="score-board"></div>

    <div id="intro-layer" onclick="startEngine()">
        <div id="part-1" class="word">GAM<span class="kill-e">E</span></div>
        <div id="part-2" class="word">AFLAK</div>
    </div>

    <div id="overlay">
        <h1 style="color:#ff4444; letter-spacing: 15px; margin-bottom: 40px;">GAMAFLAK</h1>
        
        <div id="step-1" class="menu-step active-step">
            <p style="color:#44ff44;">1. SÉLECTION NOTE</p>
            <button class="btn" onclick="validateStep(1, 2, 261.63)">DO (C)</button>
            <button class="btn" onclick="validateStep(1, 2, 329.63)">MI (E)</button>
            <button class="btn" onclick="validateStep(1, 2, 349.23)">FA (F)</button>
            <button class="btn" onclick="validateStep(1, 2, 392.00)">SOL (G)</button>
        </div>

        <div id="step-2" class="menu-step">
            <p style="color:#44ff44;">2. ESCADRILLE</p>
            <button class="btn" onclick="preparePilots(1)">1 PILOTE</button>
            <button class="btn" onclick="preparePilots(2)">2 PILOTES</button>
            <button class="btn" onclick="preparePilots(4)">4 PILOTES</button>
        </div>

        <div id="step-3" class="menu-step">
            <p style="color:#44ff44;">3. IDENTIFICATION DES PILOTES</p>
            <div id="pilot-inputs"></div>
            <button class="btn" style="border-color:#fff; color:#fff;" onclick="launchMission()">LANCER LA MISSION</button>
        </div>
    </div>

    <div id="system-container"><div id="sun" onclick="location.reload()">S</div></div>

    <script>
        const DATA = [
            {n: "Me", d: 220, s: 4.8, c: "#b2b2b2"},
            {n: "Ve", d: 350, s: 12.3, c: "#e3bb76"},
            {n: "Ea", d: 480, s: 20.0, c: "#2271b3"},
            {n: "Ma", d: 610, s: 37.6, c: "#e27b58"},
            {belt: true, d: 740},
            {n: "Ju", d: 920, s: 11.8, c: "#d39c7e"},
            {n: "Sa", d: 1150, s: 29.4, c: "#c5ab6e"},
            {n: "Ur", d: 1350, s: 84.0, c: "#bbe1e4"},
            {n: "Ne", d: 1550, s: 101.3, c: "#6081ff"}
        ];

        let audioCtx, selectedFreq, pilots = [], scores = {}, timeLeft = 120;

        function startEngine() {
            const intro = document.getElementById('intro-layer');
            if(intro.classList.contains('fusion-active')) return;
            intro.classList.add('fusion-active');
            setTimeout(() => {
                document.getElementById('flash-bang').style.animation = "flash 1s forwards";
                intro.style.display = 'none';
                document.getElementById('overlay').style.display = 'flex';
            }, 2500);
        }

        function validateStep(cur, next, val) {
            if(val) selectedFreq = val;
            document.getElementById(`step-${cur}`).classList.remove('active-step');
            document.getElementById(`step-${next}`).classList.add('active-step');
        }

        function preparePilots(count) {
            const container = document.getElementById('pilot-inputs');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                container.innerHTML += `<input type="text" placeholder="NOM PILOTE ${i}" id="p${i}" maxlength="10">`;
            }
            validateStep(2, 3);
        }

        function launchMission() {
            const inputs = document.querySelectorAll('#pilot-inputs input');
            let valid = true;
            inputs.forEach(inp => {
                if(!inp.value.trim()) valid = false;
                let name = inp.value.toUpperCase();
                pilots.push(name);
                scores[name] = 0;
            });

            if(!valid) { alert("Tous les noms sont requis !"); pilots=[]; scores={}; return; }
            
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('score-board').style.display = 'flex';
            document.getElementById('chrono-hud').style.display = 'block';
            document.getElementById('system-container').style.display = 'flex';
            
            updateScoreUI();
            startChrono();
            buildUniverse();
        }

        function updateScoreUI() {
            const container = document.getElementById('score-board');
            // Trouver le score max pour le titre de Leader
            const maxScore = Math.max(...Object.values(scores));
            
            container.innerHTML = pilots.map(p => {
                const isLeader = scores[p] === maxScore && maxScore > 0;
                return `
                    <div class="player-card ${isLeader ? 'leader' : ''}">
                        <div class="player-name">${p} ${isLeader ? '👑' : ''}</div>
                        <div class="player-pts">${scores[p]} <small style="font-size:10px">PTS</small></div>
                    </div>
                `;
            }).join('');
        }

        function startChrono() {
            const timer = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('chrono-hud').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timeLeft <= 0) { clearInterval(timer); alert("Mission terminée !"); location.reload(); }
            }, 1000);
        }

        function buildUniverse() {
            const container = document.getElementById('system-container');
            DATA.forEach(p => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = orbit.style.height = p.d + 'px';
                orbit.style.animationDuration = p.s + 's';

                if(!p.belt) {
                    const planet = document.createElement('div');
                    planet.className = 'planet';
                    planet.style.backgroundColor = p.c;
                    planet.innerText = p.n;
                    
                    planet.onclick = () => {
                        // En attendant le temps réel, on ajoute 100 pts au premier pilote au clic
                        scores[pilots[0]] += 100; 
                        updateScoreUI();
                    };
                    orbit.appendChild(planet);
                }
                container.appendChild(orbit);
            });
        }
    </script>
</body>
</html>
