<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GamAflak Test Final</title>
<style>
body {margin:0; background:black; overflow:hidden; font-family:Arial, sans-serif; color:white;}
#overlay {position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; color:white; font-size:24px; text-align:center;}
input {font-size:18px; margin:5px; padding:5px;}
button {font-size:18px; margin:5px; padding:5px; cursor:pointer;}
</style>
</head>
<body>

<div id="overlay">
  <div id="introText">Préparez-vous pour GamAflak</div>
  <button id="startIntro">Démarrer</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth; canvas.height=window.innerHeight;

let paused=false, gameStarted=false, players=[], playerCount=1, gameDuration=60;
let startTime=null, selectedNote=null;
let playerScores=[];

// PLANETS with proportional sizes and decelerated speed (40%)
const planets=[
  {code:"Me", color:"#555", size:5, dist:50, speed:0.024*0.6, angle:0, noteDo:261, noteSol:392, lastHit:0, flash:0},
  {code:"Ve", color:"#e6d690", size:12, dist:80, speed:0.018*0.6, angle:0, noteDo:293, noteSol:440, lastHit:0, flash:0},
  {code:"Ea", color:"#2a6cff", size:13, dist:110, speed:0.015*0.6, angle:0, noteDo:329, noteSol:493, lastHit:0, flash:0},
  {code:"Ma", color:"#c1440e", size:11, dist:140, speed:0.012*0.6, angle:0, noteDo:349, noteSol:523, lastHit:0, flash:0},
  {code:"Ju", color:"#d18b47", size:20, dist:190, speed:0.009*0.6, angle:0, noteDo:392, noteSol:587, lastHit:0, flash:0},
  {code:"Sa", color:"#d9c58b", size:18, dist:240, speed:0.007*0.6, angle:0, noteDo:440, noteSol:659, ring:true, lastHit:0, flash:0},
  {code:"Ur", color:"#7fdbff", size:15, dist:290, speed:0.006*0.6, angle:0, noteDo:493, noteSol:698, ringThin:true, lastHit:0, flash:0},
  {code:"Ne", color:"#1b3fff", size:15, dist:340, speed:0.0048*0.6, angle:0, noteDo:523, noteSol:784, lastHit:0, flash:0}
];

// DENSE ASTEROID BELT between Mars and Jupiter
let asteroids=[];
for(let i=0;i<80;i++){ // plus dense
  const r=140 + Math.random()*50; // entre Mars et Jupiter
  const theta=Math.random()*Math.PI*2;
  asteroids.push({r,theta, size:Math.random()*2+1});
}

// AUDIO
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function playNote(freq,duration=0.4){
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.frequency.value=freq; osc.type="sine";
  osc.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration);
  osc.start(); osc.stop(audioCtx.currentTime+duration);
}
function playCollision(){playNote(200,0.2); playNote(400,0.2); playNote(600,0.2);}

// DRAW FUNCTION
function draw(timestamp){
  if(!startTime) startTime=timestamp;
  const elapsed=(timestamp-startTime)/1000;
  if(elapsed>=gameDuration){ endGame(); return; }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2, cy=canvas.height/2;

  // SUN
  ctx.beginPath(); ctx.arc(cx,cy,25,0,Math.PI*2); ctx.fillStyle="yellow"; ctx.fill();
  ctx.fillStyle="black"; ctx.font="bold 18px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("S",cx,cy);

  // PLANET ORBITS
  planets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(cx,cy,p.dist,0,Math.PI*2);
    ctx.strokeStyle = p.flash>0?p.color:'rgba(255,255,255,0.1)';
    ctx.lineWidth=p.flash>0?3:1;
    ctx.stroke();
    if(p.flash>0) p.flash -=1;
  });

  // ASTEROIDS
  asteroids.forEach(a=>{
    const x=cx+Math.cos(a.theta)*a.r;
    const y=cy+Math.sin(a.theta)*a.r;
    ctx.beginPath(); ctx.arc(x,y,a.size,0,Math.PI*2); ctx.fillStyle="grey"; ctx.fill();
  });

  // PLANETS
  planets.forEach(p=>{
    const x=cx+Math.cos(p.angle)*p.dist;
    const y=cy+Math.sin(p.angle)*p.dist;
    ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();

    if(p.ring){ ctx.beginPath(); ctx.ellipse(x,y,p.size+12,p.size+4,Math.PI/6,0,Math.PI*2); ctx.strokeStyle="#d2b87c"; ctx.lineWidth=2; ctx.stroke();}
    if(p.ringThin){ ctx.beginPath(); ctx.ellipse(x,y,p.size+8,p.size+2,Math.PI/6,0,Math.PI*2); ctx.strokeStyle="#aeefff"; ctx.lineWidth=1; ctx.stroke();}

    ctx.fillStyle=(p.color=="#e6d690"||p.color=="#d9c58b")?"black":"white";
    ctx.font="bold 14px Arial"; ctx.fillText(p.code,x,y);

    if(p.flash>0){
      ctx.beginPath(); ctx.arc(x,y,p.size+10,0,Math.PI*2); ctx.strokeStyle=p.color; ctx.lineWidth=2; ctx.stroke();
    }

    if(!paused) p.angle+=p.speed;
  });

  // DISPLAY SCORES
  ctx.font="bold 20px Arial"; ctx.textAlign="left";
  players.forEach((pl,i)=>{
    ctx.fillStyle="white";
    ctx.fillText(`${pl}: ${playerScores[i].score} pts (combo ${playerScores[i].combo})`,10,30+i*25);
  });

  requestAnimationFrame(draw);
}

// CLICK
canvas.addEventListener("click", e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left; const my=e.clientY-rect.top;
  const cx=canvas.width/2; const cy=canvas.height/2;

  if(Math.sqrt((mx-cx)**2+(my-cy)**2)<25){ paused=!paused; return; }

  planets.forEach(p=>{
    const x=cx+Math.cos(p.angle)*p.dist;
    const y=cy+Math.sin(p.angle)*p.dist;
    if(Math.sqrt((mx-x)**2+(my-y)**2)<p.size+5){
      const freq = selectedNote==="Do"?p.noteDo:p.noteSol;
      playNote(freq);
      const orig=p.size; p.size+=3; setTimeout(()=>p.size=orig,100);
      p.flash=3; // illumination orbit

      // SCORE & COMBO
      players.forEach((pl,i)=>{
        const diff = performance.now()-p.lastHit;
        if(diff<500){ playerScores[i].score+=10; playerScores[i].combo+=1; }
        else { playerScores[i].combo=0; }
      });
    }
  });
});

// END GAME
function endGame(){
  gameStarted=false;
  overlay.style.display='flex';
  overlay.innerHTML='<h1>Fin du jeu !</h1>';
  const ranking = players.map((p,i)=>({name:p,score:playerScores[i].score,combo:playerScores[i].combo}))
    .sort((a,b)=>b.score-a.score);
  ranking.forEach((pl,i)=>{ overlay.innerHTML+=`<div>${i+1}. ${pl.name} - ${pl.score} pts (combo ${pl.combo})</div>`; });
  overlay.innerHTML+=`<br><button onclick="restartGame()">Rejouer</button>`;
}

function restartGame(){
  overlay.style.display='none';
  players=[]; playerScores=[]; gameStarted=false; startTime=null;
  startIntro.click();
}

// INTRO + COLLISION + NOTE + JOUEURS
const overlay=document.getElementById("overlay");
const startIntro=document.getElementById("startIntro");

startIntro.onclick=()=>{
  overlay.innerHTML=''; let x1=-200, x2=canvas.width+100;
  const interval=setInterval(()=>{
    overlay.innerHTML=''; overlay.style.display='flex';
    const div1=document.createElement('div'); div1.style.color='red'; div1.style.fontSize='48px'; div1.style.position='absolute'; div1.style.left=x1+'px'; div1.innerText='Game';
    const div2=document.createElement('div'); div2.style.color='green'; div2.style.fontSize='48px'; div2.style.position='absolute'; div2.style.left=x2+'px'; div2.innerText='Aflak';
    overlay.appendChild(div1); overlay.appendChild(div2);
    x1+=15; x2-=15;
    if(x1>=canvas.width/2-60){ clearInterval(interval); playCollision();
      overlay.innerHTML='<div style="font-size:48px; color:white">GamAflak</div>'; setTimeout(chooseNote,1000);
    }
  },50);
};

function chooseNote(){ overlay.innerHTML=`<div>Choisissez votre note: Do ou Sol</div>
<button onclick="selectNote('Do')">Do</button><button onclick="selectNote('Sol')">Sol</button>`; }

function selectNote(n){ selectedNote=n; setupPlayerSelection(); }

function setupPlayerSelection(){
  overlay.innerHTML=`<div>Sélectionnez le nombre de joueurs (1,2,4):</div>
  <button onclick="setupPlayers(1)">1</button><button onclick="setupPlayers(2)">2</button>
  <button onclick="setupPlayers(4)">4</button>`;
}

function setupPlayers(count){
  playerCount=count; overlay.innerHTML='';
  for(let i=1;i<=count;i++){
    const input=document.createElement('input'); input.placeholder=`Nom du joueur ${i}`; input.id=`player${i}`;
    overlay.appendChild(input); overlay.appendChild(document.createElement('br'));
  }
  const btn=document.createElement('button'); btn.innerText="Commencer le jeu"; btn.onclick=startGame;
  overlay.appendChild(btn);
}

function startGame(){
  players=[]; playerScores=[]; for(let i=1;i<=playerCount;i++){
    const name=document.getElementById(`player${i}`).value||`Player ${i}`; players.push(name);
    playerScores.push({score:0, combo:0});
  }
  overlay.style.display='none'; gameStarted=true; requestAnimationFrame(draw);
}

window.addEventListener("resize",()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
</body>
</html>
