<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GamAflak FIX</title>
<style>
body {margin:0; background:black; overflow:hidden;}
#overlay {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.9);
  color:white;
}
button {font-size:20px; padding:10px;}
</style>
</head>
<body>

<div id="overlay">
  <h1>GamAflak</h1>
  <button id="startBtn">Démarrer</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let audioCtx = null; // ⚠️ créé au clic

// PLANETS
const planets=[
 {code:"Ea",color:"#2a6cff",size:12,dist:120,speed:0.01,angle:0,note:440,flash:0},
 {code:"Ma",color:"#c1440e",size:10,dist:170,speed:0.008,angle:0,note:523,flash:0},
 {code:"Ju",color:"#d18b47",size:18,dist:240,speed:0.006,angle:0,note:587,flash:0}
];

// ASTEROIDS (fix)
let asteroids=[];
for(let i=0;i<80;i++){
 let r=180 + Math.random()*20;
 let t=Math.random()*Math.PI*2;
 asteroids.push({r,t});
}

// AUDIO FIX
function playNote(freq){
 if(!audioCtx) return;
 const osc = audioCtx.createOscillator();
 const gain = audioCtx.createGain();

 osc.frequency.value=freq;
 osc.connect(gain);
 gain.connect(audioCtx.destination);

 gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
 gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);

 osc.start();
 osc.stop(audioCtx.currentTime+0.3);
}

// DRAW LOOP
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 const cx=canvas.width/2;
 const cy=canvas.height/2;

 // SUN
 ctx.beginPath();
 ctx.arc(cx,cy,20,0,Math.PI*2);
 ctx.fillStyle="yellow";
 ctx.fill();

 // ASTEROIDS
 asteroids.forEach(a=>{
  a.t+=0.001;
  let x=cx+Math.cos(a.t)*a.r;
  let y=cy+Math.sin(a.t)*a.r;
  ctx.beginPath();
  ctx.arc(x,y,1,0,Math.PI*2);
  ctx.fillStyle="grey";
  ctx.fill();
 });

 // PLANETS
 planets.forEach(p=>{
  let x=cx+Math.cos(p.angle)*p.dist;
  let y=cy+Math.sin(p.angle)*p.dist;

  ctx.beginPath();
  ctx.arc(x,y,p.size,0,Math.PI*2);
  ctx.fillStyle=p.color;
  ctx.fill();

  if(p.flash>0){
    ctx.beginPath();
    ctx.arc(x,y,p.size+8,0,Math.PI*2);
    ctx.strokeStyle=p.color;
    ctx.stroke();
    p.flash-=0.2;
  }

  p.x=x; p.y=y;
  p.angle+=p.speed;
 });

 requestAnimationFrame(draw);
}

// CLICK
canvas.addEventListener("click",e=>{
 const rect=canvas.getBoundingClientRect();
 const mx=e.clientX-rect.left;
 const my=e.clientY-rect.top;

 planets.forEach(p=>{
  let dx=mx-p.x;
  let dy=my-p.y;

  if(Math.sqrt(dx*dx+dy*dy)<p.size){
    playNote(p.note);
    p.flash=3;
  }
 });
});

// START FIX
document.getElementById("startBtn").onclick=()=>{
 audioCtx = new (window.AudioContext||window.webkitAudioContext)(); // ✅ ici !
 document.getElementById("overlay").style.display="none";
 draw(); // ✅ lancement direct
};
</script>

</body>
</html>
