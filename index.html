<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamAflak | Symphony 64px</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* Intro & Fusion */
        #intro-layer { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; perspective: 1000px; cursor: pointer; transition: opacity 0.8s; }
        #flash-bang { position: fixed; inset: 0; background: white; opacity: 0; z-index: 210; pointer-events: none; }
        .word { position: absolute; font-size: 8vw; font-weight: 900; transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; }
        #part-1 { color: #ff4444; transform: translateX(-150%) rotateY(30deg); }
        #part-2 { color: #44ff44; transform: translateX(150%) rotateY(-30deg); }
        .fusion-active #part-1 { opacity: 1; transform: translateX(-48%) rotateY(0deg); }
        .fusion-active #part-2 { opacity: 1; transform: translateX(52%) rotateY(0deg); }
        .kill-char { display: inline-block; transition: all 0.3s ease 1.3s; width: 0.8em; opacity: 1; }
        .fusion-active .kill-char { width: 0; opacity: 0; transform: scale(0); }

        /* Menu Musical */
        #music-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .note-btn { background: #44ff44; border: none; color: #000; padding: 15px 40px; border-radius: 40px; font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin: 10px; transition: 0.3s; width: 220px; }

        /* Système Solaire */
        #system-container { position: relative; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; transform: scale(0.45); }
        #sun { width: 120px; height: 120px; background: radial-gradient(circle, #fff, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 80px #ff6600; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: #000; }
        
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; width: 64px; height: 64px; pointer-events: auto; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; cursor: pointer; }
        
        /* Anneaux */
        .rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(75deg); border-radius: 50%; border: 8px solid rgba(255,255,255,0.2); pointer-events: none; }
        .rings-sa { width: 130px; height: 130px; border-color: rgba(197, 171, 110, 0.4); }
        .rings-ur { width: 110px; height: 110px; border-color: rgba(187, 225, 228, 0.3); transform: translate(-50%, -50%) rotateY(80deg); }

        .asteroid { position: absolute; background: #fff; border-radius: 50%; box-shadow: 0 0 8px #fff; opacity: 0.8; } /* Brillance augmentée */

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flashAnim { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash-bang"></div>

    <div id="intro-layer" onclick="runFusion()">
        <div id="part-1" class="word">GAM<span class="kill-char">E</span></div>
        <div id="part-2" class="word"><span class="kill-char">A</span>FLAK</div>
    </div>

    <div id="music-menu">
        <h2 style="color:#ff4444; letter-spacing: 5px;">SÉLECTIONNER TONIQUE</h2>
        <button class="note-btn" onclick="initSystem(261.63)">DO (C)</button>
        <button class="note-btn" onclick="initSystem(329.63)">MI (E)</button>
        <button class="note-btn" onclick="initSystem(349.23)">FA (F)</button>
        <button class="note-btn" onclick="initSystem(392.00)">SOL (G)</button>
    </div>

    <div id="system-container">
        <div id="sun" onclick="location.reload()">S</div>
    </div>

    <script>
        // Intervalles de l'échelle majeure (Do=1, Ré=1.125, Mi=1.25, Fa=1.33, Sol=1.5, La=1.66, Si=1.87, Do2=2)
        const SCALE_RATIOS = [1, 1.125, 1.25, 1.33, 1.5, 1.66, 1.87, 2];
        
        const DATA = [
            {n: "ME", c: "#A5A5A5", tx: "#000", d: 180, s: 4.8},
            {n: "VE", c: "#E3BB76", tx: "#000", d: 280, s: 12.3},
            {n: "EA", c: "#2271B3", tx: "#fff", d: 400, s: 20},
            {n: "MA", c: "#E27B58", tx: "#000", d: 520, s: 37.6},
            {belt: true, d: 620},
            {n: "JU", c: "#D39C7E", tx: "#000", d: 780, s: 237},
            {n: "SA", c: "#C5AB6E", tx: "#000", d: 950, s: 589, rings: "sa"},
            {n: "UR", c: "#BBE1E4", tx: "#000", d: 1100, s: 1680, rings: "ur"},
            {n: "NE", c: "#6081FF", tx: "#fff", d: 1250, s: 3296}
        ];

        let audioCtx, baseFreq;

        function playSound(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        function runFusion() {
            const intro = document.getElementById('intro-layer');
            if (intro.classList.contains('fusion-active')) return;
            intro.classList.add('fusion-active');
            
            setTimeout(() => { document.getElementById('flash-bang').style.animation = "flashAnim 0.9s forwards"; }, 1300);
            setTimeout(() => {
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    document.getElementById('music-menu').style.display = 'flex';
                }, 800);
            }, 3000);
        }

        function initSystem(freq) {
            baseFreq = freq;
            document.getElementById('music-menu').style.display = 'none';
            const container = document.getElementById('system-container');
            container.style.display = 'flex';

            let planetIdx = 0;
            DATA.forEach((p) => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = orbit.style.height = p.d + 'px';
                orbit.style.animationDuration = p.s + 's';

                if (p.belt) {
                    for (let i = 0; i < 100; i++) {
                        const a = document.createElement('div');
                        a.className = 'asteroid';
                        a.style.width = a.style.height = (Math.random() * 5 + 2) + 'px';
                        const ang = Math.random() * Math.PI * 2;
                        const r = p.d / 2;
                        a.style.left = (Math.cos(ang) * r + r) + 'px';
                        a.style.top = (Math.sin(ang) * r + r) + 'px';
                        orbit.appendChild(a);
                    }
                } else {
                    const planetFreq = baseFreq * SCALE_RATIOS[planetIdx];
                    const planet = document.createElement('div');
                    planet.className = 'planet';
                    planet.style.backgroundColor = p.c;
                    planet.style.color = p.tx;
                    planet.innerText = p.n;
                    planet.onclick = (e) => { e.stopPropagation(); playSound(planetFreq); };
                    
                    if(p.rings) {
                        const r = document.createElement('div');
                        r.className = `rings rings-${p.rings}`;
                        planet.appendChild(r);
                    }
                    
                    orbit.appendChild(planet);
                    planetIdx++;
                }
                container.appendChild(orbit);
            });
        }
    </script>
</body>
</html>
