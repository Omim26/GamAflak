<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMAFLAK - Fusion Spatiale</title>
    <style>
        :root { --bg: #020205; --accent: #00ffcc; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; 
            overflow: hidden; touch-action: none;
        }
        
        /* --- ANIMATION DE COLLISION --- */
        #intro-layer {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .word-box { display: flex; font-size: 5rem; font-weight: 900; letter-spacing: -2px; }
        #word-left { 
            color: #ff3e3e; transform: translateX(-150vw); 
            animation: slide-in-left 1.2s cubic-bezier(0.13, 0.9, 0.4, 1) forwards;
        }
        #word-right { 
            color: var(--accent); transform: translateX(150vw); 
            animation: slide-in-right 1.2s cubic-bezier(0.13, 0.9, 0.4, 1) forwards;
        }
        .letter-e { display: inline-block; transition: all 0.2s; }
        
        @keyframes slide-in-left { to { transform: translateX(15px); } }
        @keyframes slide-in-right { to { transform: translateX(-15px); } }
        
        /* Effet d'écrasement du E */
        .fusion-impact .letter-e { width: 0; opacity: 0; transform: scaleX(0); margin: 0; }
        .fusion-impact .word-box { animation: shake 0.4s; }
        
        @keyframes shake {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: brightness(2); }
            100% { transform: scale(1); }
        }

        /* --- INTERFACE DE JEU --- */
        #game-ui { opacity: 0; transition: opacity 1s; }
        #starfield { position: absolute; inset: 0; z-index: 0; }
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        #sun { 
            width: 55px; height: 55px; background: radial-gradient(circle, #fff, #ffcc00, #ff8800); 
            border-radius: 50%; box-shadow: 0 0 50px #ffaa00; z-index: 10;
        }
        .orbit { 
            position: absolute; border: 1.5px solid rgba(255,255,255,0.08); 
            border-radius: 50%; pointer-events: none; transition: all 0.4s ease;
        }
        .orbit-active { border-width: 3px; box-shadow: inset 0 0 25px currentColor, 0 0 25px currentColor; }
        .planet-wrapper { position: absolute; width: 100%; height: 100%; animation: rotate linear infinite; }
        .planet {
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; cursor: pointer; pointer-events: auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .label { font-size: 8px; font-weight: bold; margin-top: 2px; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #hud { position: absolute; top: 30px; left: 30px; z-index: 100; }
    </style>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Écran d'intro avec fusion -->
    <div id="intro-layer" onclick="triggerFusion()">
        <div id="logo-container" class="word-box">
            <div id="word-left">GAM<span class="letter-e">E</span></div>
            <div id="word-right">AFLAK</div>
        </div>
        <div style="position:absolute; bottom:20%; color:#555; font-size:0.8rem;">CLIQUEZ POUR FUSIONNER</div>
    </div>

    <!-- Le reste du jeu -->
    <div id="game-ui">
        <div id="hud"><div id="score" style="font-size:2rem; color:var(--accent); font-weight:900;">0000</div></div>
        <canvas id="starfield"></canvas>
        <div id="game-container"><div id="sun"></div></div>
    </div>

    <script>
        const DATA = [
            { n: "Mercure", note: "DO", f: 261.63, c: "#A5A5A5", s: 22, d: 85, v: 8 },
            { n: "Vénus",   note: "RÉ", f: 293.66, c: "#E3BB76", s: 30, d: 135, v: 12 },
            { n: "Terre",   note: "MI", f: 329.63, c: "#2271B3", s: 32, d: 195, v: 16 },
            { n: "Mars",    note: "FA", f: 349.23, c: "#E27B58", s: 26, d: 255, v: 22 },
            { n: "Jupiter", note: "SOL",f: 392.00, c: "#D39C7E", s: 55, d: 340, v: 32 },
            { n: "Saturne", note: "LA", f: 440.00, c: "#C5AB6E", s: 48, d: 435, v: 45 },
            { n: "Uranus",  note: "SI", f: 493.88, c: "#BBE1E4", s: 38, d: 530, v: 60 },
            { n: "Neptune", note: "DO", f: 523.25, c: "#6081FF", s: 38, d: 620, v: 80 }
        ];

        let audioCtx = null;
        let score = 0;
        let fusionDone = false;

        function triggerFusion() {
            if(fusionDone) return;
            fusionDone = true;
            
            // Audio init
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Animation de fusion
            document.getElementById('intro-layer').classList.add('fusion-impact');
            
            // Petit son d'impact
            playNote(100, 'sawtooth', 0.5);

            setTimeout(() => {
                document.getElementById('intro-layer').style.opacity = '0';
                document.getElementById('game-ui').style.opacity = '1';
                renderSystem();
                setTimeout(() => document.getElementById('intro-layer').remove(), 1000);
            }, 1200);
        }

        function playNote(freq, type = 'triangle', dur = 1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function renderSystem() {
            const container = document.getElementById('game-container');
            DATA.forEach((p, i) => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.id = 'orb-' + i;
                orbit.style.width = orbit.style.height = (p.d * 2) + 'px';
                orbit.style.color = p.c;

                const wrapper = document.createElement('div');
                wrapper.className = 'planet-wrapper';
                wrapper.style.animationDuration = p.v + 's';

                const planet = document.createElement('div');
                planet.className = 'planet';
                planet.style.width = planet.style.height = p.s + 'px';
                planet.style.backgroundColor = p.c;
                planet.style.boxShadow = `0 0 15px ${p.c}88`;
                planet.innerHTML = `<span style="font-weight:900;color:black;">${p.note}</span>`;

                planet.onpointerdown = () => {
                    playNote(p.f);
                    score += 100;
                    document.getElementById('score').innerText = score.toString().padStart(4, '0');
                    orbit.classList.add('orbit-active');
                    setTimeout(() => orbit.classList.remove('orbit-active'), 500);
                    if (navigator.vibrate) navigator.vibrate(30);
                };

                wrapper.appendChild(planet);
                orbit.appendChild(wrapper);
                container.appendChild(orbit);
            });
        }

        // Starfield Simple
        const cvs = document.getElementById('starfield');
        const ctx = cvs.getContext('2d');
        function res() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
        window.onresize = res; res();
        function draw() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            ctx.fillStyle = "white";
            for(let i=0; i<150; i++) {
                ctx.globalAlpha = Math.random();
                ctx.fillRect(Math.random()*cvs.width, Math.random()*cvs.height, 1, 1);
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
