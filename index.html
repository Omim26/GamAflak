<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GamAflak</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let paused = false;

// PLANETS DATA
const planets = [
    {code:"Me", color:"#555", size:5, dist:50, speed:0.04, angle:0, sound:800},
    {code:"Ve", color:"#e6d690", size:7, dist:80, speed:0.03, angle:0, sound:600},
    {code:"Ea", color:"#2a6cff", size:8, dist:110, speed:0.025, angle:0, sound:500},
    {code:"Ma", color:"#c1440e", size:6, dist:140, speed:0.02, angle:0, sound:400},
    {code:"Ju", color:"#d18b47", size:14, dist:190, speed:0.015, angle:0, sound:200},
    {code:"Sa", color:"#d9c58b", size:12, dist:240, speed:0.012, angle:0, sound:250, ring:true},
    {code:"Ur", color:"#7fdbff", size:10, dist:290, speed:0.01, angle:0, sound:300, ringThin:true},
    {code:"Ne", color:"#1b3fff", size:10, dist:340, speed:0.008, angle:0, sound:150}
];

// AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.frequency.value = freq;
    osc.type = "sine";

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
}

// DRAW
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // SUN (S)
    ctx.beginPath();
    ctx.arc(cx, cy, 25, 0, Math.PI * 2);
    ctx.fillStyle = "yellow";
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("S", cx, cy);

    planets.forEach(p => {
        // ORBIT LINE
        ctx.beginPath();
        ctx.arc(cx, cy, p.dist, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.stroke();

        // POSITION
        const x = cx + Math.cos(p.angle) * p.dist;
        const y = cy + Math.sin(p.angle) * p.dist;

        // PLANET
        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        // RINGS
        if (p.ring) {
            ctx.beginPath();
            ctx.ellipse(x, y, p.size+6, p.size+2, Math.PI/6, 0, Math.PI*2);
            ctx.strokeStyle = "#e6d690";
            ctx.stroke();
        }

        if (p.ringThin) {
            ctx.beginPath();
            ctx.ellipse(x, y, p.size+4, p.size+1, Math.PI/6, 0, Math.PI*2);
            ctx.strokeStyle = "#aeefff";
            ctx.stroke();
        }

        // TEXT
        ctx.fillStyle = "white";
        ctx.font = "bold 10px Arial";
        ctx.fillText(p.code, x, y);

        // UPDATE ANGLE
        if (!paused) {
            p.angle += p.speed;
        }

        // SAVE POSITION FOR CLICK
        p.x = x;
        p.y = y;
    });

    requestAnimationFrame(draw);
}

// CLICK HANDLING
canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // CLICK SUN (S)
    const dx = mx - cx;
    const dy = my - cy;
    if (Math.sqrt(dx*dx + dy*dy) < 25) {
        paused = !paused;
        return;
    }

    // CLICK PLANETS
    planets.forEach(p => {
        const dpx = mx - p.x;
        const dpy = my - p.y;
        if (Math.sqrt(dpx*dpx + dpy*dpy) < p.size + 5) {
            playSound(p.sound);
            alert(p.code + " planet clicked!");
        }
    });
});

// RESIZE
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

draw();
</script>

</body>
</html>
