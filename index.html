<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GamAflak Musical</title>
<style>
    body { margin:0; background:black; overflow:hidden; font-family:Arial, sans-serif; color:white;}
    #overlay {
        position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.85);
        display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10;
        color:white; font-size:24px; text-align:center;
    }
    input { font-size:18px; margin:5px; padding:5px;}
    button { font-size:18px; margin:5px; padding:5px; cursor:pointer;}
</style>
</head>
<body>

<div id="overlay">
    <div id="introText">Fusion des mots: "Game" + "Aflak"</div>
    <button id="startIntro">Démarrer</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let paused = false;
let gameStarted = false;
let players = [];
let playerCount = 1;

// PLANETS DATA
const planets = [
    {code:"Me", color:"#555", size:25, dist:50, speed:0.024, angle:0, note:261},   // C4
    {code:"Ve", color:"#e6d690", size:35, dist:80, speed:0.018, angle:0, note:293}, // D4
    {code:"Ea", color:"#2a6cff", size:40, dist:110, speed:0.015, angle:0, note:329},// E4
    {code:"Ma", color:"#c1440e", size:30, dist:140, speed:0.012, angle:0, note:349},// F4
    {code:"Ju", color:"#d18b47", size:70, dist:190, speed:0.009, angle:0, note:392}, // G4
    {code:"Sa", color:"#d9c58b", size:60, dist:240, speed:0.007, angle:0, note:440, ring:true}, // A4
    {code:"Ur", color:"#7fdbff", size:50, dist:290, speed:0.006, angle:0, note:493, ringThin:true},// B4
    {code:"Ne", color:"#1b3fff", size:50, dist:340, speed:0.0048, angle:0, note:523} // C5
];

// AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playNote(freq, duration=0.5){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+duration);
    osc.start();
    osc.stop(audioCtx.currentTime+duration);
}

// DRAW FUNCTION
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const cx=canvas.width/2, cy=canvas.height/2;

    // SUN
    ctx.beginPath();
    ctx.arc(cx,cy,25,0,Math.PI*2);
    ctx.fillStyle="yellow"; ctx.fill();
    ctx.fillStyle="black"; ctx.font="bold 18px Arial";
    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("S",cx,cy);

    // Planets
    planets.forEach(p=>{
        // Orbit
        ctx.beginPath(); ctx.arc(cx,cy,p.dist,0,Math.PI*2); ctx.strokeStyle="rgba(255,255,255,0.1)"; ctx.stroke();

        const x=cx+Math.cos(p.angle)*p.dist;
        const y=cy+Math.sin(p.angle)*p.dist;

        // Planet
        ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();

        // Rings
        if(p.ring){ ctx.beginPath(); ctx.ellipse(x,y,p.size+12,p.size+4,Math.PI/6,0,Math.PI*2); ctx.strokeStyle="#e6d690"; ctx.stroke(); }
        if(p.ringThin){ ctx.beginPath(); ctx.ellipse(x,y,p.size+8,p.size+2,Math.PI/6,0,Math.PI*2); ctx.strokeStyle="#aeefff"; ctx.stroke(); }

        // Text
        ctx.fillStyle=p.color=="#e6d690"?"black":"white";
        ctx.font="bold 14px Arial"; ctx.fillText(p.code,x,y);

        // Animation angle
        if(!paused) p.angle+=p.speed;
        p.x=x; p.y=y;
    });

    requestAnimationFrame(draw);
}

// CLICK HANDLING
canvas.addEventListener("click",e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left; const my=e.clientY-rect.top;
    const cx=canvas.width/2; const cy=canvas.height/2;

    // SUN
    if(Math.sqrt((mx-cx)**2+(my-cy)**2)<25){ paused=!paused; return; }

    // Planets
    planets.forEach(p=>{
        if(Math.sqrt((mx-p.x)**2+(my-p.y)**2)<p.size+5){
            playNote(p.note);
            // Pulsation visuelle rapide
            const origSize=p.size; p.size+=5; setTimeout(()=>p.size=origSize,100);
        }
    });
});

// INTRO + PLAYER SELECTION
const overlay=document.getElementById("overlay");
const introText=document.getElementById("introText");
const startIntro=document.getElementById("startIntro");

startIntro.onclick = ()=>{
    overlay.innerHTML=`<div>Sélectionnez le nombre de joueurs (1,2,4):</div>
    <button onclick="setupPlayers(1)">1</button>
    <button onclick="setupPlayers(2)">2</button>
    <button onclick="setupPlayers(4)">4</button>`;
};

function setupPlayers(count){
    playerCount=count; overlay.innerHTML="";
    for(let i=1;i<=count;i++){
        const input=document.createElement("input");
        input.placeholder=`Nom du joueur ${i}`; input.id=`player${i}`;
        overlay.appendChild(input); overlay.appendChild(document.createElement("br"));
    }
    const btn=document.createElement("button"); btn.innerText="Commencer le jeu";
    btn.onclick=startGame; overlay.appendChild(btn);
}

function startGame(){
    players=[]; for(let i=1;i<=playerCount;i++){
        const name=document.getElementById(`player${i}`).value||`Player ${i}`;
        players.push(name);
    }
    overlay.style.display="none"; gameStarted=true; draw();
}

// RESIZE
window.addEventListener("resize",()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
</body>
</html>
