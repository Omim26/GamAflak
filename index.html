<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMAFLAK - Mission Musicale</title>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .starfield { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); z-index: -1; }
        .orbit { border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .planet-btn { cursor: pointer; transition: transform 0.2s; touch-action: manipulation; }
        .planet-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Configuration des notes (Gamme de Do Majeur pour l'harmonie)
        const NOTES = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
        
        const PLANETS = [
            { id: "me", name: "Mercure", color: "#A5A5A5", size: 20, dist: 80, speed: 1.5 },
            { id: "ve", name: "Vénus", color: "#E3BB76", size: 35, dist: 130, speed: 1.2 },
            { id: "ea", name: "Terre", color: "#2271B3", size: 40, dist: 190, speed: 1.0 },
            { id: "ma", name: "Mars", color: "#E27B58", size: 30, dist: 250, speed: 0.8 },
            { id: "ju", name: "Jupiter", color: "#D39C7E", size: 70, dist: 330, speed: 0.5 },
            { id: "sa", name: "Saturne", color: "#C5AB6E", size: 60, dist: 420, speed: 0.4 },
            { id: "ur", name: "Uranus", color: "#BBE1E4", size: 45, dist: 500, speed: 0.3 },
            { id: "ne", name: "Neptune", color: "#6081FF", size: 45, dist: 570, speed: 0.2 }
        ];

        // --- Moteur de Synthèse Audio ---
        const useAudio = () => {
            const ctx = useRef(null);
            
            const initAudio = () => {
                if (!ctx.current) ctx.current = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.current.state === 'suspended') ctx.current.resume();
            };

            const playTone = (freq) => {
                initAudio();
                const now = ctx.current.currentTime;
                const osc = ctx.current.createOscillator();
                const gain = ctx.current.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1);

                osc.connect(gain);
                gain.connect(ctx.current.destination);

                osc.start(now);
                osc.stop(now + 1);
            };

            return { playTone, initAudio };
        };

        function App() {
            const [screen, setScreen] = useState('splash'); // splash, play
            const [score, setScore] = useState(0);
            const { playTone, initAudio } = useAudio();

            const handleStart = () => {
                initAudio();
                setScreen('play');
            };

            const onPlanetClick = (planet, index) => {
                playTone(NOTES[index % NOTES.length]);
                setScore(s => s + 10);
                if (navigator.vibrate) navigator.vibrate(40);
            };

            return (
                <div className="relative h-screen w-screen bg-black overflow-hidden">
                    <div className="starfield" />
                    
                    <AnimatePresence>
                        {screen === 'splash' && (
                            <motion.div 
                                className="absolute inset-0 flex flex-col items-center justify-center z-50 bg-black/80"
                                exit={{ opacity: 0, scale: 1.2 }}
                            >
                                <motion.h1 
                                    initial={{ y: -20, opacity: 0 }}
                                    animate={{ y: 0, opacity: 1 }}
                                    className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 mb-8"
                                >
                                    GAMAFLAK
                                </motion.h1>
                                <button 
                                    onClick={handleStart}
                                    className="px-8 py-4 bg-green-600 hover:bg-green-500 rounded-full font-bold text-xl transition-all border-b-4 border-green-800 active:border-b-0"
                                >
                                    DÉCOLLAGE
                                </button>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* HUD / Interface de jeu */}
                    <div className="absolute top-6 left-6 z-40">
                        <div className="text-xs text-green-400 uppercase tracking-widest">Score de Mission</div>
                        <div className="text-3xl font-bold font-mono">{score.toString().padStart(6, '0')}</div>
                    </div>

                    {/* Espace de jeu (Le Système Solaire) */}
                    <div className="relative w-full h-full flex items-center justify-center scale-[0.6] sm:scale-100">
                        <div className="w-12 h-12 bg-yellow-400 rounded-full shadow-[0_0_50px_#facc15] z-10" />
                        
                        {PLANETS.map((p, i) => (
                            <div key={p.id} className="orbit" style={{ width: p.dist*2, height: p.dist*2 }}>
                                <motion.div
                                    className="absolute"
                                    animate={{ rotate: 360 }}
                                    transition={{ duration: 20 / p.speed, repeat: Infinity, ease: "linear" }}
                                    style={{ width: '100%', height: '100%' }}
                                >
                                    <div 
                                        onClick={() => onPlanetClick(p, i)}
                                        className="planet-btn absolute rounded-full flex items-center justify-center"
                                        style={{ 
                                            width: p.size, 
                                            height: p.size, 
                                            backgroundColor: p.color,
                                            left: '50%',
                                            top: -p.size/2,
                                            boxShadow: `0 0 20px ${p.color}66`
                                        }}
                                    >
                                        <span className="text-[8px] font-bold text-black/50">{p.id.toUpperCase()}</span>
                                    </div>
                                </motion.div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
