<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak | Mission Tactique Finale</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* 1. IMAGE DE GARDE LOCALE OBLIGATOIRE */
        #intro-layer { 
            position: fixed; inset: 0; z-index: 200; 
            background: url('file:///home/mim/Documents/E_Com/Produits Vente/Abajo__02 .jpg') center/cover;
            background-color: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        #intro-layer::after { content: "CLIQUEZ SUR L'IMAGE POUR DÉCOLLER"; position: absolute; bottom: 10%; color: #44ff44; letter-spacing: 3px; animation: blink 1.5s infinite; font-size: 14px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; }

        #flash-bang { position: fixed; inset: 0; background: white; opacity: 0; z-index: 210; pointer-events: none; }
        .word { position: absolute; font-size: 8vw; font-weight: 900; transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; pointer-events: none; }
        #part-1 { color: #ff4444; transform: translateX(-150%) rotateY(30deg); }
        #part-2 { color: #44ff44; transform: translateX(150%) rotateY(-30deg); }
        .fusion-active #part-1 { opacity: 1; transform: translateX(-40%) rotateY(0deg); }
        .fusion-active #part-2 { opacity: 1; transform: translateX(42%) rotateY(0deg); }
        .kill-e { display: inline-block; transition: all 0.2s ease 1.3s; width: 0.8em; opacity: 1; }
        .fusion-active .kill-e { width: 0; opacity: 0; transform: scale(0); }

        /* 2. MENUS HORIZONTAUX */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .menu-row { display: flex; flex-direction: row; gap: 15px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }
        .menu-step { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active-step { display: flex; }
        .btn { background: transparent; border: 2px solid #44ff44; color: #44ff44; padding: 15px 30px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; min-width: 180px; }
        .btn:hover, .btn.active { background: #44ff44; color: #000; box-shadow: 0 0 20px #44ff44; }
        input { background: rgba(255,255,255,0.1); border: 2px solid #ff4444; color: white; padding: 15px; font-family: 'Orbitron'; text-align: center; border-radius: 5px; width: 300px; outline: none; margin: 10px; font-size: 18px; }

        /* 3. HUD SCORES & SCANNER */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; display: none; background: rgba(0,0,0,0.85); padding: 20px; border-left: 5px solid #ff4444; min-width: 250px; }
        #timer-display { color: #ff4444; font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        .player-card { font-size: 14px; color: #44ff44; margin: 8px 0; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(68,255,68,0.2); }
        
        #scanner { position: fixed; bottom: 30px; right: 30px; z-index: 100; display: none; background: rgba(0,0,0,0.85); border: 1px solid #44ff44; padding: 20px; text-align: right; min-width: 250px; }

        /* 4. UNIVERS (Zoom 0.47 & 64px) */
        #system-container { position: relative; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; transform: scale(0.47); }
        #sun { width: 120px; height: 120px; background: radial-gradient(circle, #fff, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 80px #ff6600; z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: #000; cursor: pointer; border: none; }
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        .orbit.highlight { border-width: 5px; opacity: 1; z-index: 80; border-style: solid; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; width: 64px; height: 64px; pointer-events: auto; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; cursor: pointer; }
        
        .rings { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 6px solid rgba(255,255,255,0.25); pointer-events: none; }
        .rings-sa { width: 140px; height: 140px; transform: translate(-50%, -50%) rotateX(75deg); border-color: rgba(197, 171, 110, 0.5); }
        .rings-ur { width: 120px; height: 120px; transform: translate(-50%, -50%) rotateY(85deg); border-color: rgba(187, 225, 228, 0.4); }
        .asteroid { position: absolute; background: #fff; border-radius: 50%; box-shadow: 0 0 12px #fff; opacity: 0.9; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes flash { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash-bang"></div>
    <div id="hud"><div id="timer-display">02:00</div><div id="pilot-list"></div></div>
    <div id="scanner"><h3 id="p-name" style="color:#ff4444;margin:0;">SCANNER</h3><p id="p-dist" style="color:#44ff44;margin:5px 0 0;">ATTENTE...</p></div>

    <div id="intro-layer" onclick="initEngine()">
        <div id="part-1" class="word">GAM<span class="kill-e">E</span></div>
        <div id="part-2" class="word">AFLAK</div>
    </div>

    <div id="overlay">
        <h1 style="color:#ff4444; letter-spacing: 15px; margin-bottom: 30px;">GAMAFLAK</h1>
        
        <!-- ÉTAPE 1 : RESTREINTE À DO ET SOL -->
        <div id="step-1" class="menu-step active-step">
            <p style="color:#44ff44;">1. TONALITÉ DE MISSION</p>
            <div class="menu-row">
                <button class="btn" onclick="validateStep(1, 2, 261.63)">DO (C)</button>
                <button class="btn" onclick="validateStep(1, 2, 392.00)">SOL (G)</button>
            </div>
        </div>

        <div id="step-2" class="menu-step">
            <p style="color:#44ff44;">2. ESCADRILLE</p>
            <div class="menu-row">
                <button class="btn" onclick="preparePilots(1)">1</button>
                <button class="btn" onclick="preparePilots(2)">2</button>
                <button class="btn" onclick="preparePilots(4)">4</button>
            </div>
        </div>

        <div id="step-3" class="menu-step">
            <p style="color:#44ff44;">3. IDENTIFICATION DES PILOTES</p>
            <div id="pilot-inputs" class="menu-row"></div>
            <button class="btn" style="border-color:#fff; color:#fff;" onclick="launchMission()">DÉCOLLAGE</button>
        </div>
    </div>

    <div id="system-container"><div id="sun" onclick="location.reload()">S</div></div>

    <script>
        const MUSIC_RATIOS = [1, 1.125, 1.25, 1.33, 1.5, 1.66, 1.87, 2];
        const DATA = [
            {n: "Me", f: "MERCURE", c: "#A5A5A5", tx: "#000", d: 220, s: 4.8, km: 57.9},
            {n: "Ve", f: "VÉNUS", c: "#E3BB76", tx: "#000", d: 350, s: 12.3, km: 108.2},
            {n: "Ea", f: "TERRE", c: "#2271B3", tx: "#fff", d: 480, s: 20.0, km: 149.6},
            {n: "Ma", f: "MARS", c: "#E27B58", tx: "#000", d: 610, s: 37.6, km: 227.9},
            {belt: true, d: 740},
            {n: "Ju", f: "JUPITER", c: "#D39C7E", tx: "#000", d: 920, s: 14.1, km: 778.6},
            {n: "Sa", f: "SATURNE", c: "#C5AB6E", tx: "#000", d: 1150, s: 29.4, km: 1433.5, rings: "sa"},
            {n: "Ur", f: "URANUS", c: "#BBE1E4", tx: "#000", d: 1350, s: 84.0, km: 2872.5, rings: "ur"},
            {n: "Ne", f: "NEPTUNE", c: "#6081FF", tx: "#fff", d: 1550, s: 101.3, km: 4495.1}
        ];

        let audioCtx, selectedFreq, pilots = [], scores = {}, timeLeft = 120;

        function playSfx(f, dur=0.6, type='sine', vol=0.3) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function initEngine() {
            const intro = document.getElementById('intro-layer');
            if(intro.classList.contains('fusion-active')) return;
            intro.classList.add('fusion-active');
            
            // SON DE MOTEUR EN ACCÉLÉRATION
            playSfx(40, 1.3, 'sawtooth', 0.2); 
            
            setTimeout(() => {
                document.getElementById('flash-bang').style.animation = "flash 1s forwards";
                // SON DE COLLISION/CHOC LOURD
                playSfx(80, 2, 'triangle', 0.8); 
                // VIBRATION HAPTIQUE (si mobile)
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }, 1300);

            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('overlay').style.display = 'flex';
            }, 3200);
        }

        function validateStep(cur, next, val) {
            if(val) selectedFreq = val;
            playSfx(selectedFreq || 440);
            document.getElementById(`step-${cur}`).classList.remove('active-step');
            document.getElementById(`step-${next}`).classList.add('active-step');
        }

        function preparePilots(count) {
            const container = document.getElementById('pilot-inputs');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) container.innerHTML += `<input type="text" placeholder="NOM PILOTE ${i}" id="p${i}">`;
            validateStep(2, 3);
        }

        function launchMission() {
            const inputs = document.querySelectorAll('#pilot-inputs input');
            let filled = true; pilots = [];
            inputs.forEach(inp => { if(!inp.value.trim()) filled = false; let name = inp.value.toUpperCase(); pilots.push(name); scores[name] = 0; });
            if(!filled) { alert("ERREUR : Tous les noms requis !"); pilots = []; return; }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('scanner').style.display = 'block';
            document.getElementById('system-container').style.display = 'flex';
            buildUniverse(); startTimer();
        }

        function startTimer() {
            setInterval(() => {
                timeLeft--; let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                document.getElementById('pilot-list').innerHTML = pilots.map(p => `
                    <div class="player-card"><span>${p}</span><span>${scores[p]} PTS</span></div>
                `).join('');
                if(timeLeft <= 0) location.reload();
            }, 1000);
        }

        function buildUniverse() {
            const container = document.getElementById('system-container'); let pIdx = 0;
            DATA.forEach((p) => {
                const orbit = document.createElement('div'); orbit.className = 'orbit';
                orbit.style.width = orbit.style.height = p.d + 'px'; orbit.style.animationDuration = p.s + 's';
                if (!p.belt) {
                    const freq = selectedFreq * MUSIC_RATIOS[pIdx];
                    const planet = document.createElement('div'); planet.className = 'planet';
                    planet.style.backgroundColor = p.c; planet.style.color = p.tx; planet.innerText = p.n;
                    planet.onmouseenter = () => {
                        orbit.classList.add('highlight'); orbit.style.borderColor = orbit.style.boxShadow = p.c;
                        document.getElementById('p-name').innerText = p.f; document.getElementById('p-dist').innerText = p.km + " M KM";
                        playSfx(freq);
                    };
                    planet.onmouseleave = () => { orbit.classList.remove('highlight'); orbit.style.borderColor = 'rgba(255,255,255,0.08)'; orbit.style.boxShadow = 'none'; };
                    planet.onclick = () => { scores[pilots[0]] += 100; playSfx(freq * 1.5); if(navigator.vibrate) navigator.vibrate(50); };
                    if(p.rings) { const r = document.createElement('div'); r.className = `rings rings-${p.rings}`; planet.appendChild(r); }
                    orbit.appendChild(planet); pIdx++;
                } else {
                    for(let j=0; j<100; j++) {
                        const a = document.createElement('div'); a.className = 'asteroid';
                        a.style.width = a.style.height = (Math.random()*6+3)+'px';
                        const ang = Math.random()*Math.PI*2, rad = p.d/2;
                        a.style.left = (Math.cos(ang)*rad + rad) + 'px'; a.style.top = (Math.sin(ang)*rad + rad) + 'px';
                        orbit.appendChild(a);
                    }
                }
                container.appendChild(orbit);
            });
        }
    </script>
</body>
</html>
