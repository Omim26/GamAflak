<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak | Mission Alpha Final</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* 1. IMAGE DE DÉMARRAGE (Ton image devient le déclencheur) */
        #intro-layer { 
            position: fixed; inset: 0; z-index: 200; 
            background: url('Abajo__02 .jpg') center/cover; /* L'image doit être dans le même dossier que le fichier HTML */
            background-color: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        #intro-layer::after { content: "CLIQUEZ POUR DÉMARRER"; position: absolute; bottom: 10%; color: #44ff44; letter-spacing: 3px; animation: blink 1.5s infinite; font-size: 14px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; }

        #flash-bang { position: fixed; inset: 0; background: white; opacity: 0; z-index: 210; pointer-events: none; }
        .word { position: absolute; font-size: 8vw; font-weight: 900; transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; pointer-events: none; }
        
        /* CORRECTION CHEVAUCHEMENT : Ajustement des translate X pour "GamAflak" */
        #part-1 { color: #ff4444; transform: translateX(-150%) rotateY(30deg); }
        #part-2 { color: #44ff44; transform: translateX(150%) rotateY(-30deg); }
        .fusion-active #part-1 { opacity: 1; transform: translateX(-43%) rotateY(0deg); } /* Décalé pour libérer le M */
        .fusion-active #part-2 { opacity: 1; transform: translateX(45%) rotateY(0deg); } /* Décalé pour placer le A */
        
        .kill-e { display: inline-block; transition: all 0.2s ease 1.3s; width: 0.8em; opacity: 1; }
        .fusion-active .kill-e { width: 0; opacity: 0; transform: scale(0); }

        /* 2. MENUS HORIZONTAUX & VALIDATION */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .menu-row { display: flex; flex-direction: row; gap: 15px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }
        .menu-step { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active-step { display: flex; }
        .btn { background: transparent; border: 2px solid #44ff44; color: #44ff44; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; transition: 0.3s; min-width: 180px; }
        .btn:hover, .btn.active { background: #44ff44; color: #000; box-shadow: 0 0 15px #44ff44; }
        input { background: rgba(255,255,255,0.1); border: 2px solid #ff4444; color: white; padding: 12px; text-align: center; width: 250px; margin: 5px; font-family: 'Orbitron'; outline: none; }

        /* 3. HUD SCORES SÉPARÉS */
        #score-board { position: fixed; top: 20px; right: 20px; z-index: 100; display: none; flex-direction: column; gap: 10px; }
        .player-card { background: rgba(0,0,0,0.85); border: 2px solid #44ff44; padding: 10px; border-radius: 10px; min-width: 160px; }
        .player-card.leader { border-color: #ffcc00; box-shadow: 0 0 15px #ffcc00; }
        .pts-val { color: #44ff44; font-size: 22px; font-weight: 900; }
        #chrono-hud { position: fixed; top: 20px; left: 20px; z-index: 100; display: none; background: rgba(0,0,0,0.8); padding: 15px; border-left: 5px solid #ff4444; font-size: 28px; color: #ff4444; font-weight: 900; }

        /* 4. UNIVERS (Zoom 0.47 & 64px) */
        #system-container { position: relative; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; transform: scale(0.47); }
        #sun { width: 120px; height: 120px; background: radial-gradient(circle, #fff, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 80px #ff6600; z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: #000; cursor: pointer; }
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        .orbit.highlight { border-width: 5px; opacity: 1; z-index: 80; border-style: solid; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; width: 64px; height: 64px; pointer-events: auto; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; cursor: pointer; }
        
        .rings { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 6px solid rgba(255,255,255,0.25); pointer-events: none; }
        .rings-sa { width: 140px; height: 140px; transform: translate(-50%, -50%) rotateX(75deg); border-color: rgba(197, 171, 110, 0.4); }
        .rings-ur { width: 120px; height: 120px; transform: translate(-50%, -50%) rotateY(85deg); border-color: rgba(187, 225, 228, 0.3); }
        .asteroid { position: absolute; background: #fff; border-radius: 50%; box-shadow: 0 0 12px #fff; opacity: 0.9; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes flash { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash-bang"></div>
    <div id="chrono-hud">02:00</div>
    <div id="score-board"></div>

    <div id="intro-layer" onclick="startEngine()">
        <div id="part-1" class="word">GAM<span class="kill-e">E</span></div>
        <div id="part-2" class="word">AFLAK</div>
    </div>

    <div id="overlay">
        <h1 style="color:#ff4444; letter-spacing: 15px;">GAMAFLAK</h1>
        <div id="step-1" class="menu-step active-step">
            <p style="color:#44ff44;">1. TONALITÉ</p>
            <div class="menu-row">
                <button class="btn" onclick="validateStep(1, 2, 261.63)">DO (C)</button>
                <button class="btn" onclick="validateStep(1, 2, 392.00)">SOL (G)</button>
            </div>
        </div>
        <div id="step-2" class="menu-step">
            <p style="color:#44ff44;">2. ESCADRILLE</p>
            <div class="menu-row">
                <button class="btn" onclick="preparePilots(1)">1 PILOTE</button>
                <button class="btn" onclick="preparePilots(2)">2 PILOTES</button>
                <button class="btn" onclick="preparePilots(4)">4 PILOTES</button>
            </div>
        </div>
        <div id="step-3" class="menu-step">
            <p style="color:#44ff44;">3. IDENTIFICATION DES PILOTES</p>
            <div id="pilot-inputs" class="menu-row"></div>
            <button class="btn" style="border-color:#fff; color:#fff;" onclick="launchMission()">DÉCOLLAGE</button>
        </div>
    </div>

    <div id="system-container"><div id="sun" onclick="location.reload()">S</div></div>

    <script>
        const MUSIC_RATIOS = [1, 1.125, 1.25, 1.33, 1.5, 1.66, 1.87, 2];
        const DATA = [
            {n: "Me", c: "#A5A5A5", tx: "#000", d: 220, s: 4.8}, {n: "Ve", c: "#E3BB76", tx: "#000", d: 350, s: 12.3},
            {n: "Ea", c: "#2271B3", tx: "#fff", d: 480, s: 20.0}, {n: "Ma", c: "#E27B58", tx: "#000", d: 610, s: 37.6},
            {belt: true, d: 740},
            {n: "Ju", c: "#D39C7E", tx: "#000", d: 920, s: 14.1}, {n: "Sa", c: "#C5AB6E", tx: "#000", d: 1150, s: 29.4, rings: "sa"},
            {n: "Ur", c: "#BBE1E4", tx: "#000", d: 1350, s: 84.0, rings: "ur"}, {n: "Ne", c: "#6081FF", tx: "#fff", d: 1550, s: 101.3}
        ];

        let audioCtx, selectedFreq, pilots = [], scores = {}, timeLeft = 120;

        function playSfx(f, dur=0.6, type='sine') {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function startEngine() {
            const intro = document.getElementById('intro-layer');
            if(intro.classList.contains('fusion-active')) return;
            intro.classList.add('fusion-active');
            
            // SFX DE CHOC SYNCHRONISÉ
            playSfx(40, 1.3, 'sawtooth');
            setTimeout(() => {
                document.getElementById('flash-bang').style.animation = "flash 1s forwards";
                playSfx(80, 2, 'triangle');
                if (navigator.vibrate) navigator.vibrate(100);
            }, 1300);

            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('overlay').style.display = 'flex';
            }, 3500);
        }

        function validateStep(cur, next, val) {
            if(val) selectedFreq = val;
            playSfx(selectedFreq || 440);
            document.getElementById(`step-${cur}`).classList.remove('active-step');
            document.getElementById(`step-${next}`).classList.add('active-step');
        }

        function preparePilots(count) {
            const container = document.getElementById('pilot-inputs');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) container.innerHTML += `<input type="text" placeholder="NOM PILOTE ${i}" id="p${i}">`;
            validateStep(2, 3);
        }

        function launchMission() {
            const inputs = document.querySelectorAll('#pilot-inputs input');
            let allFilled = true;
            pilots = [];
            inputs.forEach(inp => {
                if(!inp.value.trim()) allFilled = false;
                let name = inp.value.toUpperCase();
                pilots.push(name);
                scores[name] = 0;
            });
            if(!allFilled) { alert("Noms requis !"); pilots=[]; return; }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('score-board').style.display = 'flex';
            document.getElementById('chrono-hud').style.display = 'block';
            document.getElementById('system-container').style.display = 'flex';
            updateUI(); buildUniverse(); startChrono();
        }

        function updateUI() {
            const max = Math.max(...Object.values(scores));
            document.getElementById('score-board').innerHTML = pilots.map(p => `
                <div class="player-card ${scores[p] === max && max > 0 ? 'leader' : ''}">
                    <div style="font-size:10px">${p}</div>
                    <div class="pts-val">${scores[p]}</div>
                </div>`).join('');
        }

        function startChrono() {
            setInterval(() => {
                timeLeft--; let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('chrono-hud').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timeLeft <= 0) location.reload();
            }, 1000);
        }

        function buildUniverse() {
            const container = document.getElementById('system-container'); let pIdx = 0;
            DATA.forEach((p) => {
                const orbit = document.createElement('div'); orbit.className = 'orbit';
                orbit.style.width = orbit.style.height = p.d + 'px'; orbit.style.animationDuration = p.s + 's';
                if (!p.belt) {
                    const freq = selectedFreq * MUSIC_RATIOS[pIdx];
                    const planet = document.createElement('div'); planet.className = 'planet';
                    planet.style.backgroundColor = p.c; planet.style.color = p.tx; planet.innerText = p.n;
                    planet.onclick = () => {
                        // RECTIFICATION SCORE INDIVIDUEL (Pilote 1 pour le test local)
                        scores[pilots[0]] += 100; 
                        updateUI(); playSfx(freq); if(navigator.vibrate) navigator.vibrate(50);
                    };
                    orbit.appendChild(planet); pIdx++;
                } else {
                    for(let j=0; j<80; j++) {
                        const a = document.createElement('div'); a.className = 'asteroid';
                        a.style.width = a.style.height = (Math.random()*6+3)+'px';
                        const ang = Math.random()*Math.PI*2, rad = p.d/2;
                        a.style.left = (Math.cos(ang)*rad + rad) + 'px'; a.style.top = (Math.sin(ang)*rad + rad) + 'px';
                        orbit.appendChild(a);
                    }
                }
                container.appendChild(orbit);
            });
        }
    </script>
</body>
</html>
