<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamAflak | Symphony Engine</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* Intro & Fusion */
        #intro-layer { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; perspective: 1000px; cursor: pointer; transition: opacity 0.8s; }
        #flash-bang { position: fixed; inset: 0; background: white; opacity: 0; z-index: 210; pointer-events: none; }
        .word { position: absolute; font-size: 8vw; font-weight: 900; transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; }
        #part-1 { color: #ff4444; transform: translateX(-150%) rotateY(30deg); }
        #part-2 { color: #44ff44; transform: translateX(150%) rotateY(-30deg); }
        .fusion-active #part-1 { opacity: 1; transform: translateX(-48%) rotateY(0deg); }
        .fusion-active #part-2 { opacity: 1; transform: translateX(52%) rotateY(0deg); }
        .kill-char { display: inline-block; transition: all 0.3s ease 1.3s; width: 0.8em; opacity: 1; }
        .fusion-active .kill-char { width: 0; opacity: 0; transform: scale(0); }

        /* Menu de Sélection Musicale */
        #music-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .note-btn { background: #44ff44; border: none; color: #000; padding: 15px 30px; border-radius: 40px; font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin: 10px; transition: 0.3s; width: 200px; }
        .note-btn:hover { transform: scale(1.1); background: #fff; }

        /* Système Solaire */
        #system-container { position: relative; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; transform: scale(0.6); }
        #sun { width: 90px; height: 90px; background: radial-gradient(circle, #fff, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 60px #ff6600; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: #000; border: none; }
        
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; width: 32px; height: 32px; /* Taille Neptune fixe */ pointer-events: auto; box-shadow: inset -6px -6px 12px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; }
        .asteroid { position: absolute; background: #555; border-radius: 50%; opacity: 0.4; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flashAnim { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash-bang"></div>

    <div id="intro-layer" onclick="runFusion()">
        <div id="part-1" class="word">GAM<span class="kill-char">E</span></div>
        <div id="part-2" class="word"><span class="kill-char">A</span>FLAK</div>
    </div>

    <div id="music-menu">
        <h2 style="color:#ff4444; letter-spacing: 5px;">CHOISIR FRÉQUENCE</h2>
        <button class="btn note-btn" onclick="initSystem(261.63)">DO (C)</button>
        <button class="btn note-btn" onclick="initSystem(329.63)">MI (E)</button>
        <button class="btn note-btn" onclick="initSystem(349.23)">FA (F)</button>
        <button class="btn note-btn" onclick="initSystem(392.00)">SOL (G)</button>
    </div>

    <div id="system-container">
        <div id="sun" onclick="location.reload()">S</div>
    </div>

    <script>
        const DATA = [
            {n: "ME", c: "#A5A5A5", txt: "#000", dist: 150, speed: 4.8},
            {n: "VE", c: "#E3BB76", txt: "#000", dist: 220, speed: 12.3},
            {n: "EA", c: "#2271B3", txt: "#fff", dist: 300, speed: 20},
            {n: "MA", c: "#E27B58", txt: "#000", dist: 380, speed: 37.6},
            {belt: true, dist: 460},
            {n: "JU", c: "#D39C7E", txt: "#000", dist: 600, speed: 237},
            {n: "SA", c: "#C5AB6E", txt: "#000", dist: 750, speed: 589},
            {n: "UR", c: "#BBE1E4", txt: "#000", dist: 900, speed: 1680},
            {n: "NE", c: "#6081FF", txt: "#fff", dist: 1050, speed: 3296}
        ];

        let audioCtx, baseFreq;

        function playImpactSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(40, now);
            osc.frequency.exponentialRampToValueAtTime(1000, now + 1.4);
            g.gain.setValueAtTime(0.2, now);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 1.5);
        }

        function runFusion() {
            const intro = document.getElementById('intro-layer');
            if (intro.classList.contains('fusion-active')) return;
            intro.classList.add('fusion-active');
            playImpactSound();
            
            setTimeout(() => { document.getElementById('flash-bang').style.animation = "flashAnim 0.9s forwards"; }, 1300);

            setTimeout(() => {
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    document.getElementById('music-menu').style.display = 'flex';
                }, 800);
            }, 3000);
        }

        function initSystem(freq) {
            baseFreq = freq;
            document.getElementById('music-menu').style.display = 'none';
            const container = document.getElementById('system-container');
            container.style.display = 'flex';

            DATA.forEach(p => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = orbit.style.height = p.dist + 'px';
                orbit.style.animationDuration = p.speed + 's';

                if (p.belt) {
                    for (let i = 0; i < 80; i++) {
                        const a = document.createElement('div');
                        a.className = 'asteroid';
                        a.style.width = a.style.height = (Math.random() * 3 + 1) + 'px';
                        const ang = Math.random() * Math.PI * 2;
                        const r = p.dist / 2;
                        a.style.left = (Math.cos(ang) * r + r) + 'px';
                        a.style.top = (Math.sin(ang) * r + r) + 'px';
                        orbit.appendChild(a);
                    }
                } else {
                    const planet = document.createElement('div');
                    planet.className = 'planet';
                    planet.style.backgroundColor = p.c;
                    planet.style.color = p.txt;
                    planet.innerText = p.n;
                    orbit.appendChild(planet);
                }
                container.appendChild(orbit);
            });
        }
    </script>
</body>
</html>
