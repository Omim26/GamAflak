<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>GAMAFLAK PRO | Score Edition</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #00ffcc; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #ui-score { position: fixed; top: 20px; right: 20px; color: var(--accent); font-size: 2rem; z-index: 1000; text-shadow: 0 0 10px var(--accent); }
        .layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: #000; }
        .btn-start { padding: 20px 40px; border: 3px solid var(--accent); color: var(--accent); background: none; font-family: 'Orbitron'; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-score">SCORE: 0</div>

    <div id="overlay" class="layer">
        <button class="btn-start" onclick="launch()">DÉMARRER</button>
    </div>

    <script>
        let app, synth, planets = [], score = 0;
        const scoreElement = document.getElementById('ui-score');

        // Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function launch() {
            await Tone.start();
            document.getElementById('overlay').style.display = 'none';
            initGame();
        }

        function initGame() {
            app = new PIXI.Application({ background: '#010105', resizeTo: window, antialias: true });
            document.body.appendChild(app.view);
            
            synth = new Tone.PolySynth(Tone.Synth).toDestination();
            const centerX = app.screen.width / 2;
            const centerY = app.screen.height / 2;

            for (let i = 0; i < 8; i++) {
                const dist = 80 + (i * 50);
                const pScore = (i + 1) * 50; // Calcul du score : 50, 100, 150... 400

                const p = new PIXI.Graphics();
                p.beginFill(0xFFFFFF, 0.2);
                p.drawCircle(0, 0, 20);
                p.endFill();
                
                p.interactive = true;
                p.x = centerX + dist;
                p.y = centerY;
                p.dist = dist;
                p.angle = Math.random() * Math.PI * 2;
                p.valeurScore = pScore; // On stocke la valeur
                p.active = false;

                p.on('pointerdown', () => {
                    p.active = !p.active;
                    if(p.active) {
                        p.tint = 0x00ffcc;
                        updateScore(p.valeurScore);
                        synth.triggerAttackRelease(261 + (i * 30), "8n");
                    } else {
                        p.tint = 0xFFFFFF;
                    }
                });

                planets.push(p);
                app.stage.addChild(p);
            }

            app.ticker.add(() => {
                planets.forEach(p => {
                    p.angle += 0.01;
                    p.x = (app.screen.width / 2) + Math.cos(p.angle) * p.dist;
                    p.y = (app.screen.height / 2) + Math.sin(p.angle) * p.dist;
                });
            });
        }

        function updateScore(points) {
            score += points;
            scoreElement.innerText = `SCORE: ${score}`;
            // Petit effet de vibration sur le score
            scoreElement.style.transform = "scale(1.2)";
            setTimeout(() => scoreElement.style.transform = "scale(1)", 100);
        }
    </script>
</body>
</html>
