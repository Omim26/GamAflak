<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GamAflak Stable</title>
<style>
body {margin:0; background:black; overflow:hidden; font-family:Arial; color:white;}
#overlay {
  position:absolute; width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:10; font-size:24px;
}
button, input {margin:5px; padding:6px; font-size:18px;}
</style>
</head>
<body>

<div id="overlay">
  <div>GamAflak</div>
  <button id="startIntro">Démarrer</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let paused=false, gameStarted=false;
let players=[], playerScores=[];
let playerCount=1;
let startTime=null;
let selectedNote=null;

// PLANETS (vitesse réduite 40%)
const planets=[
  {code:"Me", color:"#555", size:5, dist:50, speed:0.014, angle:0, noteDo:261, noteSol:392, lastHit:0, flash:0},
  {code:"Ve", color:"#e6d690", size:12, dist:80, speed:0.010, angle:0, noteDo:293, noteSol:440, lastHit:0, flash:0},
  {code:"Ea", color:"#2a6cff", size:13, dist:110, speed:0.009, angle:0, noteDo:329, noteSol:493, lastHit:0, flash:0},
  {code:"Ma", color:"#c1440e", size:11, dist:140, speed:0.007, angle:0, noteDo:349, noteSol:523, lastHit:0, flash:0},
  {code:"Ju", color:"#d18b47", size:20, dist:190, speed:0.005, angle:0, noteDo:392, noteSol:587, lastHit:0, flash:0},
  {code:"Sa", color:"#d9c58b", size:18, dist:240, speed:0.004, angle:0, noteDo:440, noteSol:659, ring:true, lastHit:0, flash:0},
  {code:"Ur", color:"#7fdbff", size:15, dist:290, speed:0.0035, angle:0, noteDo:493, noteSol:698, ringThin:true, lastHit:0, flash:0},
  {code:"Ne", color:"#1b3fff", size:15, dist:340, speed:0.003, angle:0, noteDo:523, noteSol:784, lastHit:0, flash:0}
];

// ASTEROID BELT (resserrée + animée)
let asteroids=[];
for(let i=0;i<120;i++){
  const r=155 + Math.random()*20;
  const theta=Math.random()*Math.PI*2;
  asteroids.push({r,theta,size:Math.random()*2+1});
}

// AUDIO
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function playNote(freq){
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.frequency.value=freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
  osc.start();
  osc.stop(audioCtx.currentTime+0.4);
}

// DRAW
function draw(timestamp){
  if(!startTime) startTime=timestamp;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2, cy=canvas.height/2;

  // SUN
  ctx.beginPath();
  ctx.arc(cx,cy,25,0,Math.PI*2);
  ctx.fillStyle="yellow";
  ctx.fill();
  ctx.fillStyle="black";
  ctx.fillText("S",cx,cy);

  // ORBITS
  planets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(cx,cy,p.dist,0,Math.PI*2);
    ctx.strokeStyle = p.flash>0 ? p.color : "rgba(255,255,255,0.1)";
    ctx.lineWidth = p.flash>0 ? 3 : 1;
    ctx.stroke();

    if(p.flash>0) p.flash -= 0.1;
  });

  // ASTEROIDS
  asteroids.forEach(a=>{
    a.theta += 0.0005;
    const x=cx+Math.cos(a.theta)*a.r;
    const y=cy+Math.sin(a.theta)*a.r;
    ctx.beginPath();
    ctx.arc(x,y,a.size,0,Math.PI*2);
    ctx.fillStyle="grey";
    ctx.fill();
  });

  // PLANETS
  planets.forEach(p=>{
    const x=cx+Math.cos(p.angle)*p.dist;
    const y=cy+Math.sin(p.angle)*p.dist;

    ctx.beginPath();
    ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();

    if(p.ring){
      ctx.beginPath();
      ctx.ellipse(x,y,p.size+12,p.size+4,0,0,Math.PI*2);
      ctx.strokeStyle="#d2b87c";
      ctx.stroke();
    }

    ctx.fillStyle="white";
    ctx.fillText(p.code,x,y);

    if(!paused) p.angle+=p.speed;

    p.x=x; p.y=y;
  });

  requestAnimationFrame(draw);
}

// CLICK
canvas.addEventListener("click", e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const my=e.clientY-rect.top;

  planets.forEach(p=>{
    const dx=mx-p.x;
    const dy=my-p.y;

    if(Math.sqrt(dx*dx+dy*dy)<p.size+5){

      const freq = selectedNote==="Do" ? p.noteDo : p.noteSol;
      playNote(freq);

      p.flash = 5;

      const now=performance.now();

      playerScores.forEach(s=>{
        const diff=now-p.lastHit;
        if(diff<500){ s.score+=10; s.combo++; }
        else s.combo=0;
      });

      p.lastHit = now;
    }
  });
});

// INIT
function startGame(){
  players=["Joueur"];
  playerScores=[{score:0,combo:0}];
  selectedNote="Do";
  document.getElementById("overlay").style.display="none";
  requestAnimationFrame(draw);
}

document.getElementById("startIntro").onclick=startGame;

</script>
</body>
</html>
