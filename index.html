<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMAFLAK PRO | Next-Gen</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* INTERFACE */
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.5s; }
        #cover { background: radial-gradient(circle, #1a1a1a, #000); }
        .btn { 
            padding: 20px 40px; background: none; border: 2px solid var(--accent); color: var(--accent);
            font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); border-radius: 5px;
        }
        .btn:active { background: var(--accent); color: black; }

        /* FUSION INTRO */
        #intro-box { display: none; font-size: 5rem; font-weight: 900; }
        .word { transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #word-l { color: #ff3e3e; transform: translateX(-100vw); }
        #word-r { color: var(--accent); transform: translateX(100vw); }
        .fusion #word-l { transform: translateX(45px); }
        .fusion #word-r { transform: translateX(-45px); }
    </style>
</head>
<body>

    <!-- Écran de démarrage -->
    <div id="cover" class="overlay">
        <button class="btn" onclick="initApp()">Lancer la Mission</button>
    </div>

    <!-- Intro GAMAFLAK -->
    <div id="intro" class="overlay" style="display:none; background:#000;">
        <div id="intro-box" style="display:flex;">
            <div id="word-l" class="word">GAM</div>
            <div id="word-r" class="word">AFLAK</div>
        </div>
    </div>

    <script>
        let app, synth, pContainer, line;
        const CONFIG = {
            gamme: [261.63, 293.66, 329.63, 349.23, 392.0, 440.0, 493.88, 523.25], // DO Majeur
            planets: [
                { d: 120, size: 25, color: 0xA5A5A5, speed: 0.02 },
                { d: 180, size: 30, color: 0xE3BB76, speed: 0.015 },
                { d: 240, size: 35, color: 0x2271B3, speed: 0.012 },
                { d: 300, size: 28, color: 0xE27B58, speed: 0.01 },
                { d: 380, size: 50, color: 0xD39C7E, speed: 0.008 },
                { d: 480, size: 45, color: 0xC5AB6E, speed: 0.006 },
                { d: 560, size: 35, color: 0xBBE1E4, speed: 0.004 },
                { d: 640, size: 35, color: 0x6081FF, speed: 0.003 }
            ]
        };

        async function initApp() {
            document.getElementById('cover').style.display = 'none';
            document.getElementById('intro').style.display = 'flex';
            
            // Audio init
            await Tone.start();
            synth = new Tone.PolySynth(Tone.Synth).toDestination();
            const reverb = new Tone.Reverb(3).toDestination();
            synth.connect(reverb);

            // Intro Animation
            setTimeout(() => {
                document.getElementById('intro').classList.add('fusion');
                // Son d'impact
                const noise = new Tone.NoiseSynth().toDestination();
                noise.triggerAttackRelease("16n");
                
                setTimeout(() => {
                    document.getElementById('intro').style.opacity = '0';
                    setTimeout(setupGame, 600);
                }, 1500);
            }, 500);
        }

        function setupGame() {
            document.getElementById('intro').style.display = 'none';
            
            // PixiJS Engine
            app = new PIXI.Application({ 
                background: '#010105', 
                resizeTo: window, 
                antialias: true,
                resolution: window.devicePixelRatio || 1
            });
            document.body.appendChild(app.view);

            pContainer = new PIXI.Container();
            pContainer.x = app.screen.width / 2;
            pContainer.y = app.screen.height / 2;
            app.stage.addChild(pContainer);

            // Soleil central
            const sun = new PIXI.Graphics();
            sun.beginFill(0xFFCC00);
            sun.drawCircle(0, 0, 50);
            sun.endFill();
            pContainer.addChild(sun);

            // Création des orbites et planètes
            CONFIG.planets.forEach((p, i) => {
                // Orbite
                const orbit = new PIXI.Graphics();
                orbit.lineStyle(2, 0x333333);
                orbit.drawCircle(0, 0, p.d);
                pContainer.addChild(orbit);

                // Planète
                const planet = new PIXI.Graphics();
                planet.beginFill(p.color);
                planet.drawCircle(0, 0, p.size);
                planet.endFill();
                planet.x = p.d;
                planet.interactive = true;
                planet.cursor = 'pointer';
                planet.active = false;
                
                // Effet au clic (PointerDown pour Android)
                planet.on('pointerdown', () => {
                    planet.active = !planet.active;
                    planet.alpha = planet.active ? 1 : 0.4;
                    if(planet.active) playNote(i);
                });
                planet.alpha = 0.4;

                // Animation de rotation propre
                p.graphic = planet;
                p.angle = Math.random() * Math.PI * 2;
                pContainer.addChild(planet);
            });

            // Rayon Pulsar (Séquenceur)
            line = new PIXI.Graphics();
            app.stage.addChild(line);

            app.ticker.add(gameLoop);
        }

        function playNote(index) {
            const freq = CONFIG.gamme[index % CONFIG.gamme.length];
            synth.triggerAttackRelease(freq, "8n");
        }

        let sweepAngle = 0;
        function gameLoop(delta) {
            sweepAngle += 0.02 * delta;
            
            // Dessiner la ligne du séquenceur
            line.clear();
            line.lineStyle(3, 0x00ffcc, 0.5);
            line.moveTo(app.screen.width/2, app.screen.height/2);
            const lx = app.screen.width/2 + Math.cos(sweepAngle) * 800;
            const ly = app.screen.height/2 + Math.sin(sweepAngle) * 800;
            line.lineTo(lx, ly);

            CONFIG.planets.forEach((p, i) => {
                p.angle += p.speed * delta;
                p.graphic.x = Math.cos(p.angle) * p.d;
                p.graphic.y = Math.sin(p.angle) * p.d;

                // Détection de passage du séquenceur (Collision angulaire)
                let diff = (sweepAngle % (Math.PI * 2)) - (p.angle % (Math.PI * 2));
                if (Math.abs(diff) < 0.05 && p.graphic.active) {
                    playNote(i);
                    p.graphic.scale.set(1.3);
                } else {
                    p.graphic.scale.set(1);
                }
            });
        }
    </script>
</body>
</html>
