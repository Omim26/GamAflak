<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMAFLAK - Version Finale 20%</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #010103; --accent: #00ffcc; --scale: 0.2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        
        /* 1. COUVERTURE AVEC IMAGE PRIORITAIRE */
        #cover-layer { position: fixed; inset: 0; z-index: 5000; background: black; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #cover-layer img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .btn-start { position: relative; z-index: 5001; padding: 15px 40px; background: rgba(0,0,0,0.8); border: 3px solid var(--accent); color: white; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* 2. FUSION ET CHOC */
        #intro-layer { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 4000; }
        .word-box { display: flex; font-size: 5rem; font-weight: 900; filter: drop-shadow(0 0 15px var(--accent)); }
        #word-left { color: #ff3e3e; transform: translateX(-120vw); transition: transform 0.6s cubic-bezier(0.17, 0.84, 0.44, 1); }
        #word-right { color: var(--accent); transform: translateX(120vw); transition: transform 0.6s cubic-bezier(0.17, 0.84, 0.44, 1); }
        .letter-e { display: inline-block; transition: all 0.2s; width: 1em; }
        .fusion-active #word-left { transform: translateX(25px); }
        .fusion-active #word-right { transform: translateX(-25px); }
        .fusion-active .letter-e { width: 0; opacity: 0; transform: scaleX(0); margin: 0; }

        /* 3. CONFIGURATION */
        #config-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        .section { margin: 10px; padding: 15px; border: 1px solid #333; width: 280px; text-align: center; }
        .opt { margin: 5px; padding: 10px; border: 1px solid var(--accent); background: none; color: white; cursor: pointer; border-radius: 4px; font-family: 'Orbitron'; font-size: 11px; }
        .opt.selected { background: var(--accent); color: black; font-weight: bold; }

        /* 4. JEU ULTRA-REDUIT (20%) */
        #game-ui { opacity: 0; display: none; transition: opacity 1s; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; transform: scale(var(--scale)); }
        #sun { width: 150px; height: 150px; background: radial-gradient(circle, #fff, #ffcc00, #ff8800); border-radius: 50%; box-shadow: 0 0 100px #ffaa00; z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 80px; color: black; font-weight: 900; }
        .orbit { position: absolute; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; pointer-events: none; }
        .orbit-active { border-width: 10px; box-shadow: inset 0 0 60px currentColor, 0 0 60px currentColor; }
        .p-wrap { position: absolute; width: 100%; height: 100%; animation: rot linear infinite; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; border: 5px solid white; }
        .p-text { font-size: 38px; font-weight: 900; color: white; text-shadow: 4px 4px 6px black; pointer-events: none; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="cover-layer" onclick="launchSequence()">
        <img src="ardeco_cover_02.jpg" alt="Mission Start" onerror="this.style.display='none'; this.parentElement.style.background='#0a0a15'">
        <div class="btn-start">ENTRER DANS GAMAFLAK</div>
    </div>

    <div id="intro-layer">
        <div class="word-box">
            <div id="word-left">GAM<span class="letter-e">E</span></div>
            <div id="word-right">AFLAK</div>
        </div>
    </div>

    <div id="config-menu">
        <h2 style="color:var(--accent); font-size:18px;">CONFIGURATION</h2>
        <div class="section">
            <p style="font-size:11px">GAMME MUSICALE</p>
            <button class="opt" onclick="setCfg('gamme','DO',this)">DO MAJEUR</button>
            <button class="opt" onclick="setCfg('gamme','SOL',this)">SOL MAJEUR</button>
        </div>
        <div class="section">
            <p style="font-size:11px">JOUEURS</p>
            <button class="opt" onclick="setCfg('players',1,this)">1</button>
            <button class="opt" onclick="setCfg('players',2,this)">2</button>
            <button class="opt" onclick="setCfg('players',4,this)">4</button>
        </div>
        <button id="go-btn" class="btn-start" style="display:none; margin-top:20px; font-size:14px;" onclick="startGame()">DÉCOLLAGE</button>
    </div>

    <div id="game-ui">
        <div id="game-container"><div id="sun" onclick="location.reload()">S</div></div>
    </div>

    <script>
        let cfg = { gamme: null, players: null };
        let audioCtx = null;
        const FREQS = { 
            'DO': [261.63, 293.66, 329.63, 349.23, 392.0, 440.0, 493.88, 523.25],
            'SOL': [196.0, 220.0, 246.94, 261.63, 293.66, 329.63, 369.99, 392.0]
        };
        const PLANETS = [
            { id: "Me", c: "#A5A5A5", s: 90, d: 350, v: 8 },
            { id: "Ve", c: "#E3BB76", s: 105, d: 550, v: 12 },
            { id: "Ea", c: "#2271B3", s: 110, d: 750, v: 16 },
            { id: "Ma", c: "#E27B58", s: 100, d: 950, v: 22 },
            { id: "Ju", c: "#D39C7E", s: 180, d: 1300, v: 30 },
            { id: "Sa", c: "#C5AB6E", s: 160, d: 1700, v: 40 },
            { id: "Ur", c: "#BBE1E4", s: 120, d: 2100, v: 55 },
            { id: "Ne", c: "#6081FF", s: 120, d: 2500, v: 70 }
        ];

        function playClash() {
            const n = audioCtx.currentTime;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(120, n);
            o.frequency.exponentialRampToValueAtTime(30, n + 0.6);
            g.gain.setValueAtTime(0.4, n);
            g.gain.linearRampToValueAtTime(0, n + 0.6);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(n + 0.6);
        }

        function launchSequence() {
            document.getElementById('cover-layer').style.display = 'none';
            document.getElementById('intro-layer').style.display = 'flex';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setTimeout(() => {
                document.getElementById('intro-layer').classList.add('fusion-active');
                playClash();
                setTimeout(() => {
                    document.getElementById('intro-layer').style.display = 'none';
                    document.getElementById('config-menu').style.display = 'flex';
                }, 1300);
            }, 500);
        }

        function setCfg(t, v, b) {
            cfg[t] = v;
            b.parentElement.querySelectorAll('.opt').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
            if(cfg.gamme && cfg.players) document.getElementById('go-btn').style.display = 'block';
        }

        function startGame() {
            document.getElementById('config-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            setTimeout(() => document.getElementById('game-ui').style.opacity = '1', 50);
            const container = document.getElementById('game-container');
            PLANETS.forEach((p, i) => {
                const orb = document.createElement('div');
                orb.className = 'orbit';
                orb.style.width = orb.style.height = (p.d * 2) + 'px';
                orb.style.color = p.c;
                const wr = document.createElement('div');
                wr.className = 'p-wrap';
                wr.style.animationDuration = p.v + 's';
                const pl = document.createElement('div');
                pl.className = 'planet';
                pl.style.width = pl.style.height = p.s + 'px';
                pl.style.backgroundColor = p.c;
                pl.innerHTML = `<span class="p-text">${p.id}</span>`;
                pl.onpointerdown = (e) => {
                    e.stopPropagation();
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(FREQS[cfg.gamme][i], audioCtx.currentTime);
                    g.gain.setValueAtTime(0, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                    osc.connect(g); g.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 1.2);
                    orb.classList.add('orbit-active');
                    setTimeout(() => orb.classList.remove('orbit-active'), 500);
                };
                wr.appendChild(pl); orb.appendChild(wr); container.appendChild(orb);
            });
        }
    </script>
</body>
</html>
