<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GamAflak - Core FIX</title>
<style>
body { margin:0; background:black; overflow:hidden; }
#overlay {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  color:white;
  font-family:Arial;
}
button { font-size:20px; padding:10px; }
</style>
</head>
<body>

<div id="overlay">
  <h1>GamAflak</h1>
  <button id="startBtn">Start</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let paused = false;

// ===== PLANET =====
const planet = {
  dist: 150,
  angle: 0,
  speed: 0.01,
  size: 12,
  color: "blue",
  x: 0,
  y: 0,
  flash: 0
};

// ===== LOOP =====
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  // SUN
  ctx.beginPath();
  ctx.arc(cx, cy, 25, 0, Math.PI*2);
  ctx.fillStyle = paused ? "orange" : "yellow";
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("S", cx, cy);

  // ORBIT
  ctx.beginPath();
  ctx.arc(cx, cy, planet.dist, 0, Math.PI*2);
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.stroke();

  // PLANET POSITION
  planet.x = cx + Math.cos(planet.angle) * planet.dist;
  planet.y = cy + Math.sin(planet.angle) * planet.dist;

  // PLANET
  ctx.beginPath();
  ctx.arc(planet.x, planet.y, planet.size, 0, Math.PI*2);
  ctx.fillStyle = planet.color;
  ctx.fill();

  // FLASH VISUEL
  if(planet.flash > 0){
    ctx.beginPath();
    ctx.arc(planet.x, planet.y, planet.size + 6, 0, Math.PI*2);
    ctx.strokeStyle = "white";
    ctx.stroke();
    planet.flash -= 0.2;
  }

  if(!paused){
    planet.angle += planet.speed;
  }

  requestAnimationFrame(loop);
}

// ===== CLICK =====
canvas.addEventListener("click", e=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  // CLICK SUN (pause / play)
  const dxSun = mx - cx;
  const dySun = my - cy;

  if(Math.sqrt(dxSun*dxSun + dySun*dySun) < 25){
    paused = !paused;
    console.log(paused ? "PAUSE" : "PLAY");
    return;
  }

  // CLICK PLANET
  const dx = mx - planet.x;
  const dy = my - planet.y;

  if(Math.sqrt(dx*dx + dy*dy) < planet.size){
    console.log("PLANET CLICKED ✅");
    planet.flash = 3;
  }
});

// START
document.getElementById("startBtn").onclick = ()=>{
  document.getElementById("overlay").style.display = "none";
  loop();
};
</script>

</body>
</html>
