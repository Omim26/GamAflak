<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMAFLAK - Configuration Mission</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #010103; --accent: #00ffcc; --scale: 0.7; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; 
            overflow: hidden; touch-action: none;
        }

        /* --- COUVERTURE INITIALE --- */
        #cover-layer {
            position: fixed; inset: 0; z-index: 4000;
            background: url('ardeco_cover_02.jpg') no-repeat center center;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.8s;
        }
        .btn-launch { 
            padding: 20px 40px; background: rgba(0,255,204,0.2); 
            border: 2px solid var(--accent); color: white; font-weight: 900;
            backdrop-filter: blur(10px); border-radius: 5px;
        }

        /* --- FUSION GAMAFLAK --- */
        #intro-layer {
            position: fixed; inset: 0; background: #000;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000;
        }
        .word-box { display: flex; font-size: 4rem; font-weight: 900; }
        #word-left { color: #ff3e3e; transform: translateX(-100vw); transition: transform 0.8s cubic-bezier(0.13, 0.9, 0.4, 1); }
        #word-right { color: var(--accent); transform: translateX(100vw); transition: transform 0.8s cubic-bezier(0.13, 0.9, 0.4, 1); }
        .letter-e { display: inline-block; transition: all 0.3s; width: 1em; }
        .fusion-active #word-left { transform: translateX(15px); }
        .fusion-active #word-right { transform: translateX(-15px); }
        .fusion-active .letter-e { width: 0; opacity: 0; transform: scaleX(0); }

        /* --- MENU DE CONFIGURATION --- */
        #config-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
            padding: 20px; text-align: center;
        }
        .config-section { margin: 20px 0; border: 1px solid #333; padding: 15px; border-radius: 10px; width: 300px; }
        .opt-btn { 
            margin: 5px; padding: 10px 20px; border: 1px solid var(--accent); 
            background: none; color: white; cursor: pointer; border-radius: 5px;
        }
        .opt-btn.selected { background: var(--accent); color: black; font-weight: bold; }

        /* --- JEU (ÉCHELLE -30%) --- */
        #game-ui { opacity: 0; display: none; }
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            transform: scale(var(--scale));
        }
        #sun { 
            width: 70px; height: 70px; background: radial-gradient(circle, #fff, #ffcc00, #ff8800); 
            border-radius: 50%; box-shadow: 0 0 60px #ffaa00; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 30px; color: black; font-weight: 900;
        }
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; pointer-events: none; }
        .orbit-active { border-width: 4px; box-shadow: inset 0 0 30px currentColor, 0 0 30px currentColor; }
        .planet-wrapper { position: absolute; width: 100%; height: 100%; animation: rotate linear infinite; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.5); }
        .planet-name { font-size: 11px; font-weight: bold; color: white; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 1. IMAGE DE COUVERTURE -->
    <div id="cover-layer" onclick="showIntro()">
        <div class="btn-launch">ENTRER DANS L'ESPACE</div>
    </div>

    <!-- 2. ANIMATION GAMAFLAK -->
    <div id="intro-layer">
        <div id="logo-wrap" class="word-box">
            <div id="word-left">GAM<span class="letter-e">E</span></div>
            <div id="word-right">AFLAK</div>
        </div>
    </div>

    <!-- 3. MENU CONFIGURATION -->
    <div id="config-menu">
        <h2>CONFIGURATION MISSION</h2>
        <div class="config-section">
            <p>CHOIX DE LA GAMME</p>
            <button class="opt-btn" onclick="setGamme('DO', this)">DO MAJEUR</button>
            <button class="opt-btn" onclick="setGamme('SOL', this)">SOL MAJEUR</button>
        </div>
        <div class="config-section">
            <p>NOMBRE DE JOUEURS</p>
            <button class="opt-btn" onclick="setPlayers(1, this)">1</button>
            <button class="opt-btn" onclick="setPlayers(2, this)">2</button>
            <button class="opt-btn" onclick="setPlayers(4, this)">4</button>
        </div>
        <button id="start-final" class="btn-launch" style="display:none; margin-top:20px;" onclick="launchFinal()">DÉCOLLAGE</button>
    </div>

    <!-- 4. ESPACE DE JEU -->
    <div id="game-ui">
        <div id="game-container">
            <div id="sun" onclick="location.reload()">S</div>
        </div>
    </div>

    <script>
        let selectedGamme = null;
        let selectedPlayers = null;
        let audioCtx = null;

        // Fréquences pour les deux gammes
        const GAMMES = {
            'DO': [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25],
            'SOL': [196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 369.99, 392.00]
        };

        const PLANETS_BASE = [
            { n: "Me", c: "#A5A5A5", s: 30, d: 90, v: 8 },
            { n: "Ve", c: "#E3BB76", s: 38, d: 140, v: 12 },
            { n: "Ea", c: "#2271B3", s: 40, d: 200, v: 16 },
            { n: "Ma", c: "#E27B58", s: 34, d: 260, v: 22 },
            { n: "Ju", c: "#D39C7E", s: 65, d: 350, v: 32 },
            { n: "Sa", c: "#C5AB6E", s: 55, d: 450, v: 45 },
            { n: "Ur", c: "#BBE1E4", s: 45, d: 540, v: 60 },
            { n: "Ne", c: "#6081FF", s: 45, d: 630, v: 80 }
        ];

        function showIntro() {
            document.getElementById('cover-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cover-layer').style.display = 'none';
                document.getElementById('intro-layer').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('intro-layer').classList.add('fusion-active');
                    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    setTimeout(() => {
                        document.getElementById('intro-layer').style.display = 'none';
                        document.getElementById('config-menu').style.display = 'flex';
                    }, 1500);
                }, 500);
            }, 800);
        }

        function setGamme(g, btn) {
            selectedGamme = g;
            clearSelected('.config-section:nth-child(2) .opt-btn');
            btn.classList.add('selected');
            checkConfig();
        }

        function setPlayers(p, btn) {
            selectedPlayers = p;
            clearSelected('.config-section:nth-child(3) .opt-btn');
            btn.classList.add('selected');
            checkConfig();
        }

        function clearSelected(selector) {
            document.querySelectorAll(selector).forEach(b => b.classList.remove('selected'));
        }

        function checkConfig() {
            if(selectedGamme && selectedPlayers) {
                document.getElementById('start-final').style.display = 'block';
            }
        }

        function launchFinal() {
            document.getElementById('config-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            setTimeout(() => document.getElementById('game-ui').style.opacity = '1', 100);
            initSystem();
        }

        function playNote(freq) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        function initSystem() {
            const container = document.getElementById('game-container');
            const freqs = GAMMES[selectedGamme];

            PLANETS_BASE.forEach((p, i) => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = orbit.style.height = (p.d * 2) + 'px';
                orbit.style.color = p.c;

                const wrapper = document.createElement('div');
                wrapper.className = 'planet-wrapper';
                wrapper.style.animationDuration = p.v + 's';

                const planet = document.createElement('div');
                planet.className = 'planet';
                planet.style.width = planet.style.height = p.s + 'px';
                planet.style.backgroundColor = p.c;
                planet.innerHTML = `<span class="planet-name">${p.n}</span>`;

                planet.onpointerdown = (e) => {
                    e.stopPropagation();
                    playNote(freqs[i]);
                    orbit.classList.add('orbit-active');
                    setTimeout(() => orbit.classList.remove('orbit-active'), 500);
                };

                wrapper.appendChild(planet);
                orbit.appendChild(wrapper);
                container.appendChild(orbit);
            });
        }
    </script>
</body>
</html>
