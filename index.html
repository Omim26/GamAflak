<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMAFLAK - Mission Musicale</title>
    <style>
        :root {
            --space-bg: #050510;
            --sun-color: #ffcc00;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--space-bg);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; touch-action: none;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        /* Étoiles de fond */
        .stars {
            position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle 3s infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* HUD */
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            pointer-events: none;
        }
        .stat-label { font-size: 12px; color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { font-size: 24px; font-weight: bold; }

        /* Système Solaire */
        #sun {
            width: 60px; height: 60px; background: var(--sun-color);
            border-radius: 50%; box-shadow: 0 0 50px var(--sun-color);
            z-index: 10;
        }
        .orbit {
            position: absolute; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .planet-container {
            position: absolute; width: 100%; height: 100%;
            animation: rotate linear infinite;
        }
        .planet {
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: rgba(0,0,0,0.5);
            transition: transform 0.1s; border: 2px solid rgba(255,255,255,0.2);
        }
        .planet:active { transform: translate(-50%, -50%) scale(0.8); }
        
        /* Anneaux pour Saturne */
        .rings {
            position: absolute; width: 160%; height: 40%;
            border: 4px solid rgba(200,180,150,0.4); border-radius: 50%;
            transform: rotateX(75deg);
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Écran d'accueil */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        button {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: #00ffcc; border: none; border-radius: 50px;
            cursor: pointer; color: #000; transition: 0.3s;
        }
        button:hover { transform: scale(1.1); background: #fff; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-size: 3rem; color: #00ffcc; margin-bottom: 20px;">GAMAFLAK</h1>
        <p style="margin-bottom: 30px; text-align: center; max-width: 300px;">Cliquez sur les planètes pour composer la musique de l'univers.</p>
        <button onclick="startGame()">DÉCOLLAGE</button>
    </div>

    <div id="hud">
        <div class="stat-label">Score</div>
        <div id="score" class="stat-value">000000</div>
        <div class="stat-label" style="margin-top: 10px;">Niveau</div>
        <div id="level" class="stat-value">1</div>
    </div>

    <div id="game-container">
        <div id="sun"></div>
        <!-- Les planètes seront générées ici par JS -->
    </div>

    <script>
        const planetsData = [
            { name: "Me", color: "#A5A5A5", size: 20, dist: 80, speed: 8, freq: 261.63 },
            { name: "Ve", color: "#E3BB76", size: 30, dist: 130, speed: 12, freq: 293.66 },
            { name: "Ea", color: "#2271B3", size: 32, dist: 190, speed: 16, freq: 329.63 },
            { name: "Ma", color: "#E27B58", size: 25, dist: 250, speed: 20, freq: 349.23 },
            { name: "Ju", color: "#D39C7E", size: 55, dist: 330, speed: 30, freq: 392.00 },
            { name: "Sa", color: "#C5AB6E", size: 48, dist: 420, speed: 40, freq: 440.00, hasRings: true },
            { name: "Ur", color: "#BBE1E4", size: 38, dist: 500, speed: 55, freq: 493.88 },
            { name: "Ne", color: "#6081FF", size: 38, dist: 580, speed: 70, freq: 523.25 }
        ];

        let score = 0;
        let level = 1;
        let audioCtx = null;

        // Génération des étoiles
        function createStars() {
            const container = document.body;
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.className = 'stars';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // Système Audio
        function playNote(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }

        // Création des planètes
        function initPlanets() {
            const container = document.getElementById('game-container');
            planetsData.forEach((p, index) => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = (p.dist * 2) + 'px';
                orbit.style.height = (p.dist * 2) + 'px';

                const pContainer = document.createElement('div');
                pContainer.className = 'planet-container';
                pContainer.style.animationDuration = p.speed + 's';

                const planet = document.createElement('div');
                planet.className = 'planet';
                planet.style.width = p.size + 'px';
                planet.style.height = p.size + 'px';
                planet.style.backgroundColor = p.color;
                planet.style.boxShadow = `0 0 15px ${p.color}`;
                planet.innerText = p.name;

                if (p.hasRings) {
                    const rings = document.createElement('div');
                    rings.className = 'rings';
                    planet.appendChild(rings);
                }

                planet.onclick = () => {
                    playNote(p.freq);
                    updateScore(100);
                    // Feedback visuel rapide
                    planet.style.boxShadow = `0 0 40px #fff`;
                    setTimeout(() => planet.style.boxShadow = `0 0 15px ${p.color}`, 200);
                };

                pContainer.appendChild(planet);
                orbit.appendChild(pContainer);
                container.appendChild(orbit);
            });
        }

        function updateScore(pts) {
            score += pts;
            document.getElementById('score').innerText = score.toString().padStart(6, '0');
            if (score > level * 1000) {
                level++;
                document.getElementById('level').innerText = level;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume();
        }

        // Lancement
        createStars();
        initPlanets();
    </script>
</body>
</html>
