<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamAflak | Symphony 2.0</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* Intro & Fusion */
        #intro-layer { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; perspective: 1000px; cursor: pointer; transition: opacity 0.8s; }
        #flash-bang { position: fixed; inset: 0; background: white; opacity: 0; z-index: 210; pointer-events: none; }
        .word { position: absolute; font-size: 8vw; font-weight: 900; transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; }
        #part-1 { color: #ff4444; transform: translateX(-150%) rotateY(30deg); }
        #part-2 { color: #44ff44; transform: translateX(150%) rotateY(-30deg); }
        .fusion-active #part-1 { opacity: 1; transform: translateX(-48%) rotateY(0deg); }
        .fusion-active #part-2 { opacity: 1; transform: translateX(52%) rotateY(0deg); }
        .kill-char { display: inline-block; transition: all 0.3s ease 1.3s; width: 0.8em; opacity: 1; }
        .fusion-active .kill-char { width: 0; opacity: 0; transform: scale(0); }

        /* Menu de Mission */
        #main-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .menu-row { display: flex; flex-direction: row; gap: 15px; margin: 15px 0; justify-content: center; }
        .btn { background: transparent; border: 2px solid #44ff44; color: #44ff44; padding: 12px 25px; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn:hover, .btn.active { background: #44ff44; color: #000; box-shadow: 0 0 15px #44ff44; }
        input { background: rgba(255,255,255,0.1); border: 1px solid #ff4444; color: white; padding: 10px; font-family: 'Orbitron'; text-align: center; border-radius: 5px; width: 250px; outline: none; margin: 5px; }

        /* Univers */
        #system-container { position: relative; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; transform: scale(0.3); }
        #sun { width: 120px; height: 120px; background: radial-gradient(circle, #fff, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 80px #ff6600; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: #000; }
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; transition: 0.4s; }
        .orbit.highlight { border-width: 5px; opacity: 1; z-index: 80; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; width: 64px; height: 64px; pointer-events: auto; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; cursor: pointer; }
        .rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(75deg); border-radius: 50%; border: 8px solid rgba(255,255,255,0.2); }
        .rings-sa { width: 130px; height: 130px; border-color: rgba(197, 171, 110, 0.5); }
        .rings-ur { width: 110px; height: 110px; border-color: rgba(187, 225, 228, 0.4); transform: translate(-50%, -50%) rotateY(80deg); }
        .asteroid { position: absolute; background: #fff; border-radius: 50%; box-shadow: 0 0 8px #fff; opacity: 0.8; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flashAnim { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash-bang"></div>

    <div id="intro-layer" onclick="runFusion()">
        <div id="part-1" class="word">GAM<span class="kill-char">E</span></div>
        <div id="part-2" class="word"><span class="kill-char">A</span>FLAK</div>
    </div>

    <div id="main-overlay">
        <h1 style="color:#ff4444; letter-spacing: 12px; margin-bottom: 30px;">GAMAFLAK</h1>
        <p style="color:#44ff44;">1. TONALITÉ HARMONIQUE</p>
        <div class="menu-row" id="note-row">
            <button class="btn" onclick="setNote(this, 261.63)">DO</button>
            <button class="btn" onclick="setNote(this, 329.63)">MI</button>
            <button class="btn" onclick="setNote(this, 349.23)">FA</button>
            <button class="btn" onclick="setNote(this, 392.00)">SOL</button>
        </div>
        <p style="color:#44ff44;">2. ESCADRILLE (JOUEURS)</p>
        <div class="menu-row" id="player-row">
            <button class="btn" onclick="showPilotReg(1, this)">1 PILOTE</button>
            <button class="btn" onclick="showPilotReg(2, this)">2 PILOTES</button>
            <button class="btn" onclick="showPilotReg(4, this)">4 PILOTES</button>
        </div>
        <div id="pilot-registration" style="display:none;">
            <div id="input-container"></div>
            <button class="btn" style="margin-top:20px; border-color:#fff; color:#fff; width:300px;" onclick="launchMission()">INITIALISER DÉCOLLAGE</button>
        </div>
    </div>

    <div id="system-container"><div id="sun" onclick="location.reload()">S</div></div>

    <script>
        const SCALE = [1, 1.125, 1.25, 1.33, 1.5, 1.66, 1.87, 2];
        const DATA = [
            {n: "Me", c: "#b2b2b2", tx: "#000", d: 220, s: 4.8},
            {n: "Ve", c: "#e3bb76", tx: "#000", d: 350, s: 12.3},
            {n: "Ea", c: "#2271b3", tx: "#fff", d: 480, s: 20.0},
            {n: "Ma", c: "#e27b58", tx: "#000", d: 610, s: 37.6},
            {belt: true, d: 740},
            {n: "Ju", c: "#d39c7e", tx: "#000", d: 920, s: 11.85},
            {n: "Sa", c: "#c5ab6e", tx: "#000", d: 1150, s: 29.45, rings: "sa"},
            {n: "Ur", c: "#bbe1e4", tx: "#000", d: 1350, s: 84.0, rings: "ur"},
            {n: "Ne", c: "#6081ff", tx: "#fff", d: 1550, s: 164.8}
        ];

        let audioCtx, selectedFreq = 261.63;

        function playNote(f, type='sine', vol=0.2, dur=1) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // Musique d'ambiance du jeu (Pad spacial)
        function playAmbientMusic() {
            playNote(selectedFreq / 2, 'triangle', 0.1, 4);
            playNote(selectedFreq * 1.5, 'sine', 0.05, 4);
        }

        function setNote(btn, freq) {
            document.querySelectorAll('#note-row .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedFreq = freq;
            playNote(freq, 'sine', 0.3, 0.5);
        }

        function showPilotReg(count, btn) {
            document.querySelectorAll('#player-row .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const container = document.getElementById('input-container');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) container.innerHTML += `<input type="text" placeholder="NOM PILOTE ${i}" id="p${i}" maxlength="10">`;
            document.getElementById('pilot-registration').style.display = 'block';
        }

        function runFusion() {
            const intro = document.getElementById('intro-layer');
            if (intro.classList.contains('fusion-active')) return;
            intro.classList.add('fusion-active');
            
            // Son de montée cinématique
            playNote(40, 'sawtooth', 0.2, 1.5); 
            setTimeout(() => { 
                document.getElementById('flash-bang').style.animation = "flashAnim 1s forwards";
                playNote(80, 'triangle', 0.6, 2); // Boom d'impact
            }, 1300);

            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('main-overlay').style.display = 'flex';
                playAmbientMusic(); // Musique à l'apparition du titre
            }, 3200);
        }

        function launchMission() {
            document.getElementById('main-overlay').style.display = 'none';
            const container = document.getElementById('system-container');
            container.style.display = 'flex';

            let pIdx = 0;
            DATA.forEach(p => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = orbit.style.height = p.d + 'px';
                orbit.style.animationDuration = p.s + 's';

                if (!p.belt) {
                    const freq = selectedFreq * SCALE[pIdx];
                    const planet = document.createElement('div');
                    planet.className = 'planet';
                    planet.style.backgroundColor = p.c;
                    planet.style.color = p.tx;
                    planet.innerText = p.n;
                    
                    planet.onmouseenter = () => {
                        orbit.classList.add('highlight');
                        orbit.style.borderColor = p.c;
                        orbit.style.boxShadow = `0 0 40px ${p.c}`;
                        playNote(freq, 'sine', 0.2, 0.8); // Note au survol
                    };
                    planet.onmouseleave = () => {
                        orbit.classList.remove('highlight');
                        orbit.style.borderColor = 'rgba(255,255,255,0.08)';
                        orbit.style.boxShadow = 'none';
                    };

                    if(p.rings) {
                        const r = document.createElement('div');
                        r.className = `rings rings-${p.rings}`;
                        planet.appendChild(r);
                    }
                    orbit.appendChild(planet);
                    pIdx++;
                } else {
                    for(let i=0; i<80; i++) {
                        const a = document.createElement('div');
                        a.className = 'asteroid';
                        a.style.width = a.style.height = (Math.random()*4+3)+'px';
                        const ang = Math.random()*Math.PI*2;
                        a.style.left = (Math.cos(ang)*p.d/2 + p.d/2)+'px';
                        a.style.top = (Math.sin(ang)*p.d/2 + p.d/2)+'px';
                        orbit.appendChild(a);
                    }
                }
                container.appendChild(orbit);
            });
        }
    </script>
</body>
</html>
